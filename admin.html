<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administración | Nostalgia Cubana</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="js/app-service.js" type="module"></script>

    <style>
        :root { --primary: #2563eb; --dark: #0f172a; --card: #1e293b; --text-muted: #94a3b8; }
        body { font-family: 'Inter', sans-serif; background: var(--dark); color: white; margin: 0; }
        .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; padding: 20px; }
        .stat-card { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid #334155; }
    </style>
</head>
<body>

    <div id="app">
        <header style="padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #334155;">
            <h1>Admin Dashboard</h1>
            <div class="user-info">
                <span id="admin-name" style="margin-right: 15px; color: var(--text-muted);">Cargando...</span>
                <button id="btnSalir" style="background: #ef4444; color: white; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer;">
                    <i class="fas fa-sign-out-alt"></i> Salir
                </button>
            </div>
        </header>

        <main class="dashboard-grid">
            <div class="stat-card" onclick="location.href='gestion-stock.html'" style="cursor:pointer">
                <h3><i class="fas fa-boxes"></i> Inventario</h3>
                <p>Gestionar productos y existencias</p>
            </div>
            <div class="stat-card" onclick="location.href='gestion-dependientes.html'" style="cursor:pointer">
                <h3><i class="fas fa-users"></i> Dependientes</h3>
                <p>Control de acceso y personal</p>
            </div>
            <div class="stat-card" onclick="location.href='reportes.html'" style="cursor:pointer">
                <h3><i class="fas fa-chart-line"></i> Reportes</h3>
                <p>Ventas, ganancias y estadísticas</p>
            </div>
        </main>
    </div>

    <script type="module">
        // Importamos el servicio unificado
        import { AppService } from './js/app-service.js';

        // 3. CONEXIÓN COMPARTIDA
        const sb = window.sb; 
        let perfilAdmin = null;

        async function init() {
            // Protección de Seguridad (Claude): Solo admins entran aquí
            perfilAdmin = await AppService.validarSesion('admin');
            
            if (perfilAdmin) {
                document.getElementById('admin-name').textContent = perfilAdmin.nombre || perfilAdmin.email;
                cargarResumenRapido();
                configurarEventos();
            }
        }

        async function cargarResumenRapido() {
            // Optimización Gemini: Solo pedimos conteos rápidos
            try {
                const { count: totalProductos } = await sb
                    .from('productos')
                    .select('*', { count: 'exact', head: true })
                    .eq('owner_id', perfilAdmin.id);

                console.log("Productos bajo gestión:", totalProductos);
                // Aquí podrías llenar pequeños indicadores en el dashboard
            } catch (err) {
                console.error("Error en resumen:", err);
            }
        }

        function configurarEventos() {
            // El botón de salir usa la lógica centralizada
            document.getElementById('btnSalir').onclick = () => AppService.salir();
        }

        // Arrancamos el panel
        init();
    </script>
</body>
</html>
