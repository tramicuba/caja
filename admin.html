<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Panel Administrativo | Nostalgia Cubana</title>
    <link rel="manifest" href="/manifest.json">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config-auth.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #2563eb; --dark: #0f172a; --card: #1e293b; --danger: #ef4444; --success: #10b981; --text-muted: #94a3b8; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background-color: var(--dark); color: white; }
        .lock-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15,23,42,0.98); display: flex; justify-content: center; align-items: center; z-index: 9999; backdrop-filter: blur(10px); }
        .lock-card { background: var(--card); padding: 40px; border-radius: 20px; text-align: center; border: 1px solid #334155; max-width: 400px; width: 90%; }
        .sidebar { width: 260px; background: var(--card); height: 100vh; position: fixed; border-right: 1px solid #334155; padding: 30px 20px; transition: transform 0.3s; z-index: 100; overflow-y: auto; }
        .main-content { margin-left: 260px; padding: 40px; transition: margin 0.3s; }
        .nav-link { display: block; padding: 12px 15px; color: var(--text-muted); text-decoration: none; border-radius: 8px; margin-bottom: 10px; }
        .nav-link:hover, .nav-link.active { background: rgba(37,99,235,0.1); color: var(--primary); }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-top: 30px; }
        .stat-card { background: var(--card); padding: 25px; border-radius: 15px; border: 1px solid #334155; }
        .stat-card h3 { color: var(--text-muted); font-size: 0.9rem; font-weight: 400; }
        .stat-card p { font-size: 1.8rem; font-weight: 600; margin: 10px 0 0; }
        .btn-logout { margin-top: 50px; color: var(--danger); cursor: pointer; border: 1px solid var(--danger); padding: 10px; text-align: center; border-radius: 8px; }
        .vencimiento-badge { font-size: 0.72rem; padding: 4px 10px; border-radius: 20px; font-weight: 600; display: inline-block; margin-top: 10px; }
        .vence-ok { background: rgba(16,185,129,0.15); color: var(--success); }
        .vence-pronto { background: rgba(245,158,11,0.15); color: #f59e0b; }
        .menu-toggle { display: none; position: fixed; top: 15px; left: 15px; background: var(--primary); color: white; border: none; border-radius: 8px; padding: 10px 15px; z-index: 101; cursor: pointer; }
        .status-bar { font-size: 0.7rem; padding: 4px 8px; border-radius: 20px; display: inline-block; background: #0f172a; }
        .online { color: var(--success); }
        .offline { color: var(--danger); }
        @media (max-width: 768px) {
            .menu-toggle { display: block; }
            .sidebar { transform: translateX(-100%); width: 80%; max-width: 280px; }
            .sidebar.open { transform: translateX(0); }
            .main-content { margin-left: 0; padding: 60px 15px 20px; }
            .stats-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div id="lockScreen" class="lock-overlay">
        <div class="lock-card">
            <h2>Acceso Restringido</h2>
            <p>Debes iniciar sesión para acceder al panel administrativo.</p>
            <button onclick="window.location.href='index.html'" style="background:var(--primary);color:white;width:100%;border:none;padding:12px;border-radius:8px;">Ir al Login</button>
        </div>
    </div>
    <button class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button>
    <div class="sidebar" id="sidebar">
        <h2 style="color: var(--primary);">Nostalgia Cubana</h2>
        <div id="vencimiento-info"></div>
        <nav>
            <a href="admin.html" class="nav-link active"><i class="fas fa-home"></i> Inicio</a>
            <a href="gestion-stock.html" class="nav-link"><i class="fas fa-box"></i> Inventario</a>
            <a href="reportes.html" class="nav-link"><i class="fas fa-chart-bar"></i> Reportes de Ventas</a>
            <a href="cuadre-admin.html" class="nav-link"><i class="fas fa-clipboard-list"></i> Cuadre Administrador</a>
            <a href="gestion-dependientes.html" class="nav-link"><i class="fas fa-users"></i> Dependientes</a>
        </nav>
        <div class="btn-logout" onclick="cerrarSesion()">Cerrar Sesión</div>
    </div>

    <div class="main-content">
        <header style="display: flex; justify-content: space-between; align-items: center;">
            <h1>Bienvenido al Panel</h1>
            <div id="connectionStatus" class="status-bar">🔄</div>
        </header>
        <div id="user-display" style="color: var(--text-muted); margin-bottom: 20px;">Cargando...</div>
        <div class="stats-grid">
            <div class="stat-card">
                <h3>Ventas del Día</h3>
                <p id="ventas-dia">$0.00</p>
                <div id="ventas-cantidad" class="sublabel"></div>
            </div>
            <div class="stat-card">
                <h3>Cantidad de productos</h3>
                <p id="total-stock">0</p>
                <div id="productos-cantidad" class="sublabel"></div>
            </div>
            <div class="stat-card">
                <h3>Ganancia del Día</h3>
                <p id="ganancia-total" style="color: var(--success);">$0.00</p>
            </div>
        </div>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').catch(err => console.log('SW error:', err));
            });
        }
        function updateConnectionStatus() {
            const statusDiv = document.getElementById('connectionStatus');
            if (navigator.onLine) {
                statusDiv.innerHTML = '✅ En línea';
                statusDiv.className = 'status-bar online';
            } else {
                statusDiv.innerHTML = '⚠️ Sin conexión';
                statusDiv.className = 'status-bar offline';
            }
        }
        window.addEventListener('online', updateConnectionStatus);
        window.addEventListener('offline', updateConnectionStatus);
        updateConnectionStatus();

        const sb = window.supabaseInstance;
        let profileGlobal = null;

        function getTodayRange() {
            const now = new Date();
            const start = new Date(now.getFullYear(), now.getMonth(), now.getDate());
            const end = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1);
            end.setMilliseconds(-1);
            return { start: start.toISOString(), end: end.toISOString() };
        }

        async function cargarEstadisticas(ownerId) {
            if (!navigator.onLine) {
                document.getElementById('ventas-dia').innerText = '--';
                document.getElementById('total-stock').innerText = '--';
                document.getElementById('ganancia-total').innerText = '--';
                return;
            }
            const { start, end } = getTodayRange();
            const { data: ventas } = await sb.from('ventas').select('precio_total, precio_compra_momento, cantidad').eq('owner_id', ownerId).eq('eliminada', false).gte('created_at', start).lte('created_at', end);
            if (ventas) {
                const totalVentas = ventas.reduce((s, v) => s + (v.precio_total || 0), 0);
                const gananciaReal = ventas.reduce((s, v) => s + ((v.precio_total || 0) - ((v.precio_compra_momento || 0) * (v.cantidad || 1))), 0);
                document.getElementById('ventas-dia').innerText = `$${totalVentas.toFixed(2)}`;
                document.getElementById('ventas-cantidad').innerText = `${ventas.length} transacción${ventas.length !== 1 ? 'es' : ''}`;
                document.getElementById('ganancia-total').innerText = `$${gananciaReal.toFixed(2)}`;
            }
            const { data: productos } = await sb.from('productos').select('stock').eq('owner_id', ownerId);
            if (productos) {
                const totalStock = productos.reduce((s, p) => s + (p.stock || 0), 0);
                document.getElementById('total-stock').innerText = totalStock;
                document.getElementById('productos-cantidad').innerText = `${productos.length} producto${productos.length !== 1 ? 's' : ''} distintos`;
            }
        }

        document.addEventListener('DOMContentLoaded', async () => {
            const perfil = await window.validarAccesoGlobal(['admin']);
            if (!perfil) return;
            profileGlobal = perfil;
            document.getElementById('lockScreen').style.display = 'none';
            document.getElementById('user-display').innerHTML = `<i class="fas fa-user-shield"></i> ${window.escapeHtml(perfil.email)}`;
            if (perfil.vencimiento) {
                const dias = Math.ceil((new Date(perfil.vencimiento) - new Date()) / 86400000);
                const clase = dias <= 7 ? 'vence-pronto' : 'vence-ok';
                const texto = dias <= 0 ? 'Suscripción vencida' : `Vence en ${dias} días`;
                document.getElementById('vencimiento-info').innerHTML = `<span class="vencimiento-badge ${clase}">${texto}</span>`;
            }
            await cargarEstadisticas(perfil.id);
        });

        const toggle = document.getElementById('menuToggle'), side = document.getElementById('sidebar');
        toggle.addEventListener('click', () => side.classList.toggle('open'));
        document.addEventListener('click', (e) => { if (window.innerWidth <= 768 && !side.contains(e.target) && !toggle.contains(e.target) && side.classList.contains('open')) side.classList.remove('open'); });
    </script>
</body>
</html>
