<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Panel Administrativo | Nostalgia Cubana</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="config-auth.js"></script>
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --dark: #0f172a;
            --card: #1e293b;
            --success: #10b981;
            --danger: #ef4444;
            --text-muted: #94a3b8;
            --border: #334155;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--dark); 
            color: white; 
            min-height: 100vh;
            display: flex;
        }

        /* Overlay de Carga/Bloqueo */
        .lock-overlay {
            position: fixed;
            inset: 0;
            background: var(--dark);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255,255,255,0.1);
            border-left-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* Sidebar mejorado */
        .sidebar {
            width: 260px;
            background: var(--card);
            border-right: 1px solid var(--border);
            padding: 2rem 1.5rem;
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease;
        }

        .sidebar-header {
            margin-bottom: 2.5rem;
            text-align: center;
        }

        .sidebar-header h2 {
            font-size: 1.25rem;
            color: var(--primary);
            letter-spacing: 1px;
        }

        .nav-menu { list-style: none; flex-grow: 1; }
        .nav-item { margin-bottom: 0.5rem; }
        .nav-link {
            display: flex;
            align-items: center;
            padding: 0.75rem 1rem;
            color: var(--text-muted);
            text-decoration: none;
            border-radius: 0.5rem;
            transition: all 0.2s;
        }

        .nav-link i { width: 20px; margin-right: 12px; }
        .nav-link:hover, .nav-link.active {
            background: rgba(37, 99, 235, 0.1);
            color: white;
        }

        .btn-logout {
            margin-top: auto;
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
            border: none;
            padding: 0.75rem;
            border-radius: 0.5rem;
            cursor: pointer;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        /* Contenido Principal */
        .main-content {
            flex-grow: 1;
            padding: 2rem;
            overflow-y: auto;
        }

        .header-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--card);
            padding: 1.5rem;
            border-radius: 1rem;
            border: 1px solid var(--border);
        }

        .stat-card h3 {
            color: var(--text-muted);
            font-size: 0.875rem;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .stat-footer {
            margin-top: 1rem;
            font-size: 0.75rem;
            color: var(--success);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: -260px;
                height: 100%;
                z-index: 1000;
            }
            .sidebar.open { transform: translateX(260px); }
            .main-content { padding: 1rem; }
            .mobile-header {
                display: flex;
                align-items: center;
                justify-content: space-between;
                margin-bottom: 1rem;
            }
        }
    </style>
</head>
<body>

    <div id="loader" class="lock-overlay">
        <div class="spinner"></div>
        <p style="margin-top: 15px; color: var(--text-muted);">Verificando acceso...</p>
    </div>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2>NOSTALGIA CUBANA</h2>
        </div>
        <nav class="nav-menu">
            <div class="nav-item"><a href="admin.html" class="nav-link active"><i class="fas fa-chart-line"></i> Dashboard</a></div>
            <div class="nav-item"><a href="gestion-stock.html" class="nav-link"><i class="fas fa-boxes"></i> Inventario</a></div>
            <div class="nav-item"><a href="gestion-dependientes.html" class="nav-link"><i class="fas fa-users"></i> Vendedores</a></div>
            <div class="nav-item"><a href="reportes.html" class="nav-link"><i class="fas fa-file-invoice-dollar"></i> Reportes</a></div>
            <div class="nav-item"><a href="cuadre-admin.html" class="nav-link"><i class="fas fa-cash-register"></i> Cuadre de Caja</a></div>
        </nav>
        <button onclick="cerrarSesion()" class="btn-logout">
            <i class="fas fa-sign-out-alt"></i> Cerrar Sesión
        </button>
    </aside>

    <main class="main-content">
        <div class="mobile-header">
            <button id="menuToggle" style="background:none; border:none; color:white; font-size:1.5rem;">
                <i class="fas fa-bars"></i>
            </button>
            <h1>Panel de Control</h1>
        </div>

        <div class="header-stats">
            <div class="stat-card">
                <h3>Ventas del Mes</h3>
                <div class="stat-value" id="ventas-total">$0.00</div>
                <div class="stat-footer" id="ventas-cantidad">0 transacciones</div>
            </div>
            <div class="stat-card">
                <h3>Ganancia Estimada</h3>
                <div class="stat-value" id="ganancia-total" style="color: var(--success);">$0.00</div>
                <div class="stat-footer">Margen neto acumulado</div>
            </div>
            <div class="stat-card">
                <h3>Stock Total</h3>
                <div class="stat-value" id="total-stock">0</div>
                <div class="stat-footer" id="productos-cantidad">Cargando productos...</div>
            </div>
        </div>

        <div class="stat-card" style="min-height: 300px; display: flex; align-items: center; justify-content: center; color: var(--text-muted);">
            <p><i class="fas fa-chart-pie"></i> Visualización de métricas en desarrollo</p>
        </div>
    </main>

    <script>
        const sb = window.supabaseInstance;
        let ownerId = null;

        async function init() {
            try {
                const profile = await validarAccesoGlobal();
                if (!profile) return; // validarAccesoGlobal maneja la redirección
                
                if (profile.rol !== 'admin') {
                    window.location.href = 'index.html';
                    return;
                }

                ownerId = profile.id;
                document.getElementById('loader').style.display = 'none';
                await cargarDashboard();
            } catch (err) {
                console.error("Error en init:", err);
            }
        }

        async function cargarDashboard() {
            // Obtener ventas del mes actual
            const ahora = new Date();
            const inicioMes = new Date(ahora.getFullYear(), ahora.getMonth(), 1).toISOString();

            const { data: ventas, error: vError } = await sb
                .from('ventas')
                .select('precio_total, ganancia')
                .eq('owner_id', ownerId)
                .eq('eliminada', false)
                .gte('created_at', inicioMes);

            if (!vError && ventas) {
                const totalVentas = ventas.reduce((acc, v) => acc + (v.precio_total || 0), 0);
                const totalGanancia = ventas.reduce((acc, v) => acc + (v.ganancia || 0), 0);
                
                document.getElementById('ventas-total').innerText = `$${totalVentas.toFixed(2)}`;
                document.getElementById('ganancia-total').innerText = `$${totalGanancia.toFixed(2)}`;
                document.getElementById('ventas-cantidad').innerText = `${ventas.length} transacción${ventas.length !== 1 ? 'es' : ''}`;
            }

            // Obtener datos de inventario
            const { data: productos, error: pError } = await sb
                .from('productos')
                .select('stock')
                .eq('owner_id', ownerId);

            if (!pError && productos) {
                const totalStock = productos.reduce((acc, p) => acc + (p.stock || 0), 0);
                document.getElementById('total-stock').innerText = totalStock;
                document.getElementById('productos-cantidad').innerText = `${productos.length} productos registrados`;
            }
        }

        async function cerrarSesion() {
            await sb.auth.signOut();
            window.location.href = 'index.html';
        }

        // Manejo de menú móvil
        const menuToggle = document.getElementById('menuToggle');
        const sidebar = document.getElementById('sidebar');
        
        menuToggle?.addEventListener('click', () => sidebar.classList.toggle('open'));

        document.addEventListener('click', (e) => {
            if (window.innerWidth <= 768 && !sidebar.contains(e.target) && !menuToggle.contains(e.target)) {
                sidebar.classList.remove('open');
            }
        });

        init();
    </script>
</body>
</html>
