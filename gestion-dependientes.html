<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Vendedores | Nostalgia Cubana</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config-auth.js"></script>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; padding: 20px; }
        .card { background: #1e293b; padding: 20px; border-radius: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #334155; }
    </style>
</head>
<body>
    <h1>Mis Dependientes</h1>
    <div class="card">
        <tbody id="lista-dep"></tbody>
    </div>
    <script>
        const sb = window.sb;
        async function init() {
            const user = await validarAccesoGlobal();
            if (user) {
                const { data } = await sb.from('perfiles').select('*').eq('admin_id', user.id).eq('rol', 'dependiente');
                document.getElementById('lista-dep').innerHTML = data.map(d => `
                    <tr>
                        <td>${d.nombre || d.email}</td>
                        <td>${d.estado_activo ? 'Activo' : 'Inactivo'}</td>
                    </tr>
                `).join('');
            }
        }
        init();
    </script>
</body>
</html>
