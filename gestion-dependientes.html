<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vendedores | Nostalgia Cubana</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config-auth.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --primary: #3b82f6;
            --success: #10b981;
            --danger: #ef4444;
            --dark: #0f172a;
            --card: #1e293b;
            --border: #334155;
            --text-muted: #94a3b8;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--dark); color: white; display: flex; height: 100vh; }

        .sidebar { width: 260px; background: var(--card); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .sidebar-header { padding: 30px 20px; text-align: center; }
        .nav-links { flex: 1; padding: 10px; }
        .nav-links a {
            display: flex; align-items: center; padding: 12px 15px; color: var(--text-muted);
            text-decoration: none; border-radius: 10px; margin-bottom: 5px;
        }
        .nav-links a:hover, .nav-links a.active { background: rgba(59, 130, 246, 0.1); color: white; }
        .nav-links i { width: 25px; margin-right: 10px; }

        .main-content { flex: 1; overflow-y: auto; padding: 30px; }
        
        .header-actions { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }

        /* Formulario */
        .card-form { background: var(--card); border: 1px solid var(--border); padding: 25px; border-radius: 20px; margin-bottom: 30px; }
        .grid-form { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; align-items: flex-end; }
        
        .form-group { display: flex; flex-direction: column; gap: 8px; }
        label { font-size: 0.8rem; color: var(--text-muted); font-weight: 600; }
        input {
            padding: 12px; background: #0f172a; border: 1px solid var(--border);
            border-radius: 10px; color: white;
        }

        /* Tabla */
        .table-container { background: var(--card); border-radius: 20px; border: 1px solid var(--border); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        th { background: rgba(255,255,255,0.03); padding: 15px 20px; text-align: left; color: var(--text-muted); font-size: 0.8rem; }
        td { padding: 15px 20px; border-bottom: 1px solid var(--border); }

        .status-pill { padding: 4px 10px; border-radius: 20px; font-size: 0.7rem; font-weight: 700; }
        .active { background: rgba(16, 185, 129, 0.1); color: var(--success); }
        .inactive { background: rgba(239, 68, 68, 0.1); color: var(--danger); }

        .btn { padding: 10px 20px; border-radius: 10px; border: none; cursor: pointer; font-weight: 600; transition: 0.3s; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-action { background: #334155; color: white; font-size: 0.8rem; padding: 6px 12px; }
        .btn-action:hover { background: var(--primary); }

    </style>
</head>
<body>

    <nav class="sidebar">
        <div class="sidebar-header">
            <h3>Administración</h3>
        </div>
        <div class="nav-links">
            <a href="admin.html"><i class="fas fa-chart-line"></i> Dashboard</a>
            <a href="gestion-stock.html"><i class="fas fa-cubes"></i> Productos</a>
            <a href="#" class="active"><i class="fas fa-users"></i> Vendedores</a>
            <a href="reportes.html"><i class="fas fa-file-invoice-dollar"></i> Reportes</a>
            <a href="#" onclick="cerrarSesion()"><i class="fas fa-sign-out-alt"></i> Salir</a>
        </div>
    </nav>

    <main class="main-content">
        <div class="header-actions">
            <h1>Gestión de Vendedores</h1>
        </div>

        <div class="card-form">
            <h3 style="margin-bottom: 15px;">Registrar Nuevo Trabajador</h3>
            <div class="grid-form">
                <div class="form-group">
                    <label>Correo Electrónico</label>
                    <input type="email" id="dep_email" placeholder="empleado@correo.com">
                </div>
                <div class="form-group">
                    <label>Contraseña Temporal</label>
                    <input type="password" id="dep_pass" placeholder="******">
                </div>
                <button class="btn btn-primary" onclick="crearVendedor()">Registrar Vendedor</button>
            </div>
            <p style="font-size: 0.75rem; color: var(--text-muted); margin-top: 10px;">
                * El vendedor usará estas credenciales para entrar a la pantalla de Caja.
            </p>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Email</th>
                        <th>Estado</th>
                        <th>Último Acceso</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="vendedoresBody">
                    </tbody>
            </table>
        </div>
    </main>

    <script>
        const sb = window.supabaseInstance;
        let currentUser = null;

        async function init() {
            const access = await validarAccesoGlobal();
            if (!access) return;
            currentUser = access.user;
            listarVendedores();
        }

        async function listarVendedores() {
            const { data, error } = await sb
                .from('perfiles')
                .select('*')
                .eq('admin_id', currentUser.id)
                .eq('rol', 'dependiente');

            if (data) {
                const tbody = document.getElementById('vendedoresBody');
                tbody.innerHTML = data.map(v => `
                    <tr>
                        <td>${v.email}</td>
                        <td>
                            <span class="status-pill ${v.estado_activo ? 'active' : 'inactive'}">
                                ${v.estado_activo ? 'Activo' : 'Suspendido'}
                            </span>
                        </td>
                        <td style="color: var(--text-muted); font-size: 0.85rem;">
                            ${v.ultimo_acceso ? new Date(v.ultimo_acceso).toLocaleString() : 'Nunca'}
                        </td>
                        <td>
                            <button class="btn btn-action" onclick="toggleEstado('${v.id}', ${v.estado_activo})">
                                ${v.estado_activo ? 'Suspender' : 'Activar'}
                            </button>
                        </td>
                    </tr>
                `).join('');
            }
        }

        async function crearVendedor() {
            const email = document.getElementById('dep_email').value;
            const password = document.getElementById('dep_pass').value;

            if (!email || !password) return alert("Completa los datos.");

            // 1. Registro en Auth (El Admin lo registra)
            const { data, error } = await sb.auth.signUp({ email, password });

            if (error) {
                alert("Error: " + error.message);
                return;
            }

            // 2. Crear perfil vinculado
            const { error: pError } = await sb.from('perfiles').insert([{
                id: data.user.id,
                email: email,
                rol: 'dependiente',
                admin_id: currentUser.id,
                estado_activo: true
            }]);

            if (pError) alert("Error perfil: " + pError.message);
            else {
                alert("Vendedor registrado con éxito.");
                document.getElementById('dep_email').value = '';
                document.getElementById('dep_pass').value = '';
                listarVendedores();
            }
        }

        async function toggleEstado(id, actual) {
            const { error } = await sb
                .from('perfiles')
                .update({ estado_activo: !actual })
                .eq('id', id);
            
            if (!error) listarVendedores();
        }

        async function cerrarSesion() {
            await sb.auth.signOut();
            window.location.href = 'index.html';
        }

        init();
    </script>
</body>
</html>
