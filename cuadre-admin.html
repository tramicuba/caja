<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cuadre de Caja | Nostalgia Cubana</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config-auth.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --primary: #3b82f6;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --dark: #0f172a;
            --card: #1e293b;
            --border: #334155;
            --text-muted: #94a3b8;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--dark); color: white; display: flex; height: 100vh; }

        /* Sidebar */
        .sidebar { width: 260px; background: var(--card); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .sidebar-header { padding: 30px 20px; text-align: center; }
        .nav-links { flex: 1; padding: 10px; }
        .nav-links a {
            display: flex; align-items: center; padding: 12px 15px; color: var(--text-muted);
            text-decoration: none; border-radius: 10px; margin-bottom: 5px;
        }
        .nav-links a:hover, .nav-links a.active { background: rgba(59, 130, 246, 0.1); color: white; }
        .nav-links i { width: 25px; margin-right: 10px; }

        /* Main Content */
        .main-content { flex: 1; overflow-y: auto; padding: 30px; }
        
        .header-flex { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }

        /* Tabla de Turnos */
        .table-container { background: var(--card); border-radius: 15px; border: 1px solid var(--border); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        th { background: rgba(255,255,255,0.03); padding: 15px 20px; text-align: left; color: var(--text-muted); font-size: 0.8rem; text-transform: uppercase; }
        td { padding: 15px 20px; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
        
        .badge { padding: 4px 8px; border-radius: 6px; font-size: 0.75rem; font-weight: 600; }
        .badge-success { background: rgba(16, 185, 129, 0.1); color: var(--success); }
        .badge-danger { background: rgba(239, 68, 68, 0.1); color: var(--danger); }

        .diff-pos { color: var(--success); font-weight: 600; }
        .diff-neg { color: var(--danger); font-weight: 600; }

        .btn { padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; transition: 0.2s; font-size: 0.85rem; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { opacity: 0.9; }

    </style>
</head>
<body>

    <nav class="sidebar">
        <div class="sidebar-header">
            <h3>Administración</h3>
        </div>
        <div class="nav-links">
            <a href="admin.html"><i class="fas fa-chart-line"></i> Dashboard</a>
            <a href="gestion-stock.html"><i class="fas fa-cubes"></i> Productos</a>
            <a href="gestion-dependientes.html"><i class="fas fa-users"></i> Vendedores</a>
            <a href="reportes.html"><i class="fas fa-file-invoice-dollar"></i> Reportes</a>
            <a href="#" class="active"><i class="fas fa-cash-register"></i> Cuadres</a>
            <a href="#" onclick="cerrarSesion()"><i class="fas fa-sign-out-alt"></i> Salir</a>
        </div>
    </nav>

    <main class="main-content">
        <div class="header-flex">
            <h1>Cuadres de Turnos</h1>
            <button class="btn btn-primary" onclick="cargarTurnos()"><i class="fas fa-sync"></i> Actualizar</button>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Vendedor</th>
                        <th>Apertura</th>
                        <th>Cierre</th>
                        <th>Sistema</th>
                        <th>Reportado</th>
                        <th>Diferencia</th>
                        <th>Estado</th>
                    </tr>
                </thead>
                <tbody id="turnosBody">
                    </tbody>
            </table>
        </div>
    </main>

    <script>
        const sb = window.supabaseInstance;
        let currentUser = null;

        async function init() {
            const access = await validarAccesoGlobal();
            if (!access) return;
            currentUser = access.user;
            await cargarTurnos();
        }

        async function cargarTurnos() {
            const { data, error } = await sb
                .from('turnos')
                .select(`
                    *,
                    perfiles:vendedor_id(email)
                `)
                .eq('owner_id', currentUser.id)
                .order('fecha_apertura', { ascending: false })
                .limit(50);

            if (error) {
                console.error(error);
                return;
            }

            renderizarTurnos(data);
        }

        function renderizarTurnos(turnos) {
            const tbody = document.getElementById('turnosBody');
            
            if (turnos.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align:center; padding:40px; color:var(--text-muted)">No hay turnos registrados</td></tr>';
                return;
            }

            tbody.innerHTML = turnos.map(t => {
                const sistema = t.ventas_totales || 0;
                const reportado = t.efectivo_cierre || 0;
                const diferencia = reportado - sistema;
                const diffClass = diferencia === 0 ? '' : (diferencia > 0 ? 'diff-pos' : 'diff-neg');
                
                const estadoBadge = t.estado === 'abierto' 
                    ? '<span class="badge badge-success">Abierto</span>' 
                    : '<span class="badge" style="background:rgba(148,163,184,0.1); color:var(--text-muted)">Cerrado</span>';

                return `
                    <tr>
                        <td><strong>${t.perfiles?.email.split('@')[0]}</strong></td>
                        <td style="color:var(--text-muted)">${new Date(t.fecha_apertura).toLocaleString()}</td>
                        <td style="color:var(--text-muted)">${t.fecha_cierre ? new Date(t.fecha_cierre).toLocaleString() : '-'}</td>
                        <td>$${sistema.toFixed(2)}</td>
                        <td>$${reportado.toFixed(2)}</td>
                        <td class="${diffClass}">$${diferencia.toFixed(2)}</td>
                        <td>${estadoBadge}</td>
                    </tr>
                `;
            }).join('');
        }

        async function cerrarSesion() {
            await sb.auth.signOut();
            window.location.href = 'index.html';
        }

        init();
    </script>
</body>
</html>
