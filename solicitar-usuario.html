<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Solicitar Usuario | Nostalgia Cubana</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #3b82f6;
            --dark: #0f172a;
            --card: #1e293b;
            --success: #10b981;
            --error: #ef4444;
            --text-muted: #94a3b8;
            --border: #334155;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--dark);
            color: white;
            display: flex;
            height: 100vh;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: var(--card);
            padding: 35px;
            border-radius: 24px;
            width: 100%;
            max-width: 420px;
            border: 1px solid var(--border);
            text-align: center;
        }
        .logo i { font-size: 3rem; color: var(--primary); margin-bottom: 15px; }
        h2 { margin-bottom: 10px; }
        .subtitle { color: var(--text-muted); font-size: 0.85rem; margin-bottom: 25px; }
        .input-group { text-align: left; margin-bottom: 20px; }
        label { display: block; font-size: 0.8rem; margin-bottom: 8px; color: var(--text-muted); }
        input {
            width: 100%;
            padding: 12px 16px;
            background: #0f172a;
            border: 1px solid var(--border);
            border-radius: 12px;
            color: white;
        }
        button {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        .error-msg, .success-msg { padding: 10px; border-radius: 8px; font-size: 0.85rem; margin-top: 15px; display: none; }
        .error-msg { background: rgba(239,68,68,0.1); color: var(--error); }
        .success-msg { background: rgba(16,185,129,0.1); color: var(--success); }
        .back-link { display: inline-block; margin-top: 20px; color: var(--text-muted); text-decoration: none; }
        .back-link:hover { color: white; }
    </style>
</head>
<body>
<div class="card">
    <div class="logo"><i class="fas fa-user-plus"></i></div>
    <h2>Solicitar Acceso</h2>
    <p class="subtitle">Completa tus datos y envía tu solicitud por WhatsApp</p>

    <div class="input-group">
        <label>Correo Electrónico</label>
        <input type="email" id="email" placeholder="tu@correo.com">
    </div>
    <div class="input-group">
        <label>Contraseña Deseada</label>
        <input type="text" id="password" placeholder="mínimo 6 caracteres">
    </div>
    <div class="input-group">
        <label>Nombre Completo (opcional)</label>
        <input type="text" id="nombre" placeholder="Ej: Juan Pérez">
    </div>
    <button id="solicitarBtn"><i class="fab fa-whatsapp"></i> Solicitar por WhatsApp</button>
    
    <div id="errorMsg" class="error-msg"></div>
    <div id="successMsg" class="success-msg"></div>
    
    <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Volver al inicio</a>
</div>

<script>
    const TELEFONO = '5355542964';
    document.getElementById('solicitarBtn').addEventListener('click', async () => {
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value.trim();
        const nombre = document.getElementById('nombre').value.trim();
        const errorDiv = document.getElementById('errorMsg');
        const successDiv = document.getElementById('successMsg');
        const btn = document.getElementById('solicitarBtn');

        errorDiv.style.display = 'none';
        successDiv.style.display = 'hide';

        if (!email || !email.includes('@')) {
            errorDiv.innerText = '❌ Correo inválido.';
            errorDiv.style.display = 'block';
            return;
        }
        if (!password || password.length < 6) {
            errorDiv.innerText = '❌ Contraseña (mínimo 6 caracteres).';
            errorDiv.style.display = 'block';
            return;
        }

        let mensaje = `📢 *SOLICITUD DE USUARIO - CAJA REGISTRADORA*%0A`;
        mensaje += `%0A✉️ *Correo:* ${encodeURIComponent(email)}`;
        mensaje += `%0A🔑 *Contraseña:* ${encodeURIComponent(password)}`;
        if (nombre) mensaje += `%0A👤 *Nombre:* ${encodeURIComponent(nombre)}`;

        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Preparando...';

        try {
            const url = `https://api.whatsapp.com/send?phone=${TELEFONO}&text=${mensaje}`;
            successDiv.innerHTML = `✅ Solicitud lista. <a href="${url}" target="_blank" style="color:var(--success);">Haz clic aquí</a> si no se abre automáticamente.`;
            successDiv.style.display = 'block';
            window.open(url, '_blank');
        } catch (err) {
            errorDiv.innerText = '❌ Error: ' + err.message;
            errorDiv.style.display = 'block';
        } finally {
            btn.disabled = false;
            btn.innerHTML = '<i class="fab fa-whatsapp"></i> Solicitar por WhatsApp';
        }
    });
</script>
</body>
</html>
