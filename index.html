<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Acceso | Sistema Gestión Nostalgia Cubana</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config-auth.js"></script>
    <style>
        :root { --primary: #3b82f6; --dark: #0f172a; --error: #ef4444; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--dark);
            color: white;
            display: flex;
            height: 100vh;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-card {
            background: #1e293b;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 380px;
        }
        h2 { text-align: center; margin-bottom: 30px; font-weight: 300; }
        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 0.85rem; color: #94a3b8; }
        input, select {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #334155;
            background: #0f172a;
            color: white;
        }
        .password-wrapper { position: relative; }
        .password-wrapper input { padding-right: 45px; }
        .toggle-password {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #94a3b8;
            cursor: pointer;
        }
        button {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        .error-msg {
            color: var(--error);
            font-size: 0.8rem;
            text-align: center;
            margin-top: 15px;
            display: none;
            background: rgba(239,68,68,0.1);
            padding: 10px;
            border-radius: 5px;
        }
        .user-counter {
            margin-top: 25px;
            text-align: center;
            font-size: 0.85rem;
            color: #94a3b8;
            border-top: 1px solid #334155;
            padding-top: 20px;
        }
        .counter-number { font-weight: bold; color: var(--primary); }
    </style>
</head>
<body>
<div class="login-card">
    <h2>Sistema Gestión</h2>
    <div class="input-group">
        <label>Correo Electrónico</label>
        <input type="email" id="email" placeholder="ejemplo@estudio.com">
    </div>
    <div class="input-group">
        <label>Contraseña</label>
        <div class="password-wrapper">
            <input type="password" id="password" placeholder="••••••••">
            <button type="button" class="toggle-password" id="togglePasswordBtn">👁️</button>
        </div>
    </div>
    <div class="input-group">
        <label>Rol de Acceso</label>
        <select id="role">
            <option value="admin">Administrador (Dueño)</option>
            <option value="dependiente">Dependiente (Ventas)</option>
        </select>
    </div>
    <button id="loginBtn">Iniciar Sesión</button>
    <div id="error" class="error-msg"></div>
    <div class="user-counter">
        <i class="fas fa-users"></i> CANTIDAD DE USUARIOS: 
        <span id="userCount" class="counter-number">...</span>
    </div>
</div>

<script>
    const toggleBtn = document.getElementById('togglePasswordBtn');
    const passwordInput = document.getElementById('password');
    toggleBtn.addEventListener('click', () => {
        const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
        passwordInput.setAttribute('type', type);
        toggleBtn.textContent = type === 'password' ? '👁️' : '🙈';
    });

    async function login() {
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const selectedRole = document.getElementById('role').value;
        const errorDiv = document.getElementById('error');
        const btn = document.getElementById('loginBtn');

        errorDiv.style.display = 'none';
        btn.innerText = "Verificando...";
        btn.disabled = true;

        try {
            const sb = window.supabaseInstance;
            const { data, error } = await sb.auth.signInWithPassword({ email, password });
            if (error) throw new Error("Credenciales inválidas.");

            const { data: profile } = await sb
                .from('perfiles')
                .select('rol, eliminado')
                .eq('id', data.user.id)
                .single();

            if (!profile || profile.eliminado) throw new Error("Cuenta desactivada.");
            if (profile.rol !== selectedRole) throw new Error(`No tienes permiso de ${selectedRole}.`);

            // Redirigir según rol
            const paginas = { superadmin: 'superadmin.html', admin: 'admin.html', dependiente: 'caja.html' };
            window.location.href = paginas[selectedRole];
        } catch (err) {
            errorDiv.innerText = err.message;
            errorDiv.style.display = 'block';
            btn.innerText = "Iniciar Sesión";
            btn.disabled = false;
        }
    }

    document.getElementById('loginBtn').onclick = login;
    // Función para cargar la cantidad de usuarios
async function cargarContadorUsuarios() {
    const supabase = window.supabaseInstance;
    // Contar todos los perfiles (puedes ajustar el filtro si quieres solo activos)
    const { count, error } = await supabase
        .from('perfiles')
        .select('*', { count: 'exact', head: true });
    
    if (!error && count !== null) {
        document.getElementById('userCount').innerText = count;
    } else {
        console.error('Error al contar usuarios:', error);
        document.getElementById('userCount').innerText = '0';
    }
}

// Llamar a la función cuando cargue la página
    document.addEventListener('DOMContentLoaded', cargarContadorUsuarios);
    document.getElementById('userCount').innerText = '?';
</script>
</body>
</html>
