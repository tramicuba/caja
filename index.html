<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Acceso | Nostalgia Cubana</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config-auth.js"></script>
    <style>
        :root { --primary: #3b82f6; --dark: #0f172a; --error: #ef4444; }
        body { font-family: 'Inter', sans-serif; background: var(--dark); color: white; display: flex; height: 100vh; align-items: center; justify-content: center; margin: 0; }
        .login-card { background: #1e293b; padding: 40px; border-radius: 20px; width: 100%; max-width: 380px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; }
        button { width: 100%; padding: 12px; background: var(--primary); border: none; color: white; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        #error-msg { color: var(--error); font-size: 14px; text-align: center; margin-top: 10px; display: none; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2 style="text-align: center; margin-bottom: 20px;">Nostalgia Cubana</h2>
        <input type="email" id="email" placeholder="Correo electrónico">
        <input type="password" id="password" placeholder="Contraseña">
        <select id="role">
            <option value="dependiente">Dependiente</option>
            <option value="admin">Administrador</option>
            <option value="superadmin">Soporte Técnico</option>
        </select>
        <button id="loginBtn" onclick="login()">Iniciar Sesión</button>
        <div id="error-msg"></div>
    </div>

    <script>
        const sb = window.sb;

        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const selectedRole = document.getElementById('role').value;
            const btn = document.getElementById('loginBtn');
            const errorDiv = document.getElementById('error-msg');

            btn.disabled = true;
            btn.innerText = "Cargando...";
            errorDiv.style.display = "none";

            try {
                const { data, error } = await sb.auth.signInWithPassword({ email, password });
                if (error) throw error;

                const profile = await validarAccesoGlobal();
                if (profile) {
                    if (profile.rol !== selectedRole) {
                        await sb.auth.signOut();
                        throw new Error("El rol no coincide con esta cuenta.");
                    }
                    const rutas = { 'superadmin': 'superadmin.html', 'admin': 'admin.html', 'dependiente': 'caja.html' };
                    window.location.href = rutas[profile.rol];
                }
            } catch (err) {
                errorDiv.innerText = err.message;
                errorDiv.style.display = "block";
                btn.disabled = false;
                btn.innerText = "Iniciar Sesión";
            }
        }
    </script>
</body>
</html>
