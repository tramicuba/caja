<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Caja | Nostalgia Cubana</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="js/app-service.js" type="module"></script>

    <style>
        :root {
            --primary: #2563eb;
            --dark: #0f172a;
            --card: #1e293b;
            --success: #10b981;
            --border: #334155;
        }
        body { font-family: 'Inter', sans-serif; background: var(--dark); color: white; margin: 0; overflow-x: hidden; }
        /* Estilos simplificados para el ejemplo */
        .container { padding: 20px; display: grid; grid-template-columns: 1fr 350px; gap: 20px; }
        @media (max-width: 768px) { .container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div id="app">
        <header>
            <button id="menuToggle"><i class="fas fa-bars"></i></button>
            <h1>Nostalgia Cubana - Caja</h1>
            <button id="btnSalir" class="btn-danger">Salir</button>
        </header>

        <div class="container">
            <section id="productos-section">
                <input type="text" id="search" placeholder="Buscar producto...">
                <div id="lista-productos" class="grid-productos">
                    </div>
            </section>

            <aside id="carrito-section">
                <h3>Venta Actual</h3>
                <div id="items-carrito"></div>
                <div class="total">Total: <span id="total-monto">$0.00</span></div>
                <button id="btn-finalizar" class="btn-success">Finalizar Venta</button>
            </aside>
        </div>
    </div>

    <script type="module">
        // Importamos el cerebro central
        import { AppService } from './js/app-service.js';

        // Usamos la instancia global compartida
        const sb = window.sb; 
        let usuarioActual = null;

        // INICIO DE LA APP
        async function init() {
            // Validamos sesión con el nuevo servicio
            usuarioActual = await AppService.validarSesion('dependiente');
            
            if (usuarioActual) {
                console.log("Sesión activa:", usuarioActual.email);
                cargarProductos();
                configurarEventos();
            }
        }

        // Lógica de carga optimizada (Capa de Servicio)
        async function cargarProductos() {
            const container = document.getElementById('lista-productos');
            
            // Llamamos a Supabase usando la instancia global 'sb'
            const { data, error } = await sb
                .from('productos')
                .select('id, nombre, precio, stock')
                .eq('eliminado', false)
                .gt('stock', 0);

            if (error) return console.error("Error al cargar:", error);

            container.innerHTML = data.map(p => `
                <div class="card-producto" onclick="agregarAlCarrito('${p.id}', '${p.nombre}', ${p.precio})">
                    <h4>${p.nombre}</h4>
                    <p>$${p.precio}</p>
                    <small>Stock: ${p.stock}</small>
                </div>
            `).join('');
        }

        function configurarEventos() {
            // Botón de salir usa el servicio central
            document.getElementById('btnSalir').onclick = () => AppService.salir();
            
            // Menú lateral (UI dinámica)
            document.getElementById('menuToggle').onclick = () => {
                document.getElementById('sidebar').classList.toggle('open');
            };
        }

        // Arrancamos
        init();
    </script>
</body>
</html>
