<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Caja | Nostalgia Cubana</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config-auth.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #2563eb; --dark: #0f172a; --card: #1e293b; --success: #10b981; }
        body { font-family: 'Inter', sans-serif; background: var(--dark); color: white; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 260px; background: var(--card); border-right: 1px solid #334155; padding: 20px; display: flex; flex-direction: column; }
        .main-content { flex-grow: 1; display: grid; grid-template-columns: 1fr 350px; background: #0a0f1d; }
        .productos-grid { padding: 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; overflow-y: auto; }
        .producto-card { background: var(--card); padding: 15px; border-radius: 12px; text-align: center; cursor: pointer; border: 1px solid #334155; }
        .producto-card:active { transform: scale(0.95); }
        .carrito-panel { background: #161e2e; border-left: 1px solid #334155; padding: 20px; display: flex; flex-direction: column; }
        #items-carrito { flex-grow: 1; overflow-y: auto; margin-top: 20px; }
        .btn-venta { background: var(--success); color: white; border: none; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h3>Nostalgia Cubana</h3>
        <p id="userName" style="color: #94a3b8;">Cargando...</p>
        <div style="margin-top: auto;">
            <button onclick="cerrarSesion()" style="background: #ef4444; border: none; color: white; width: 100%; padding: 10px; border-radius: 6px; cursor: pointer;">Cerrar Sesión</button>
        </div>
    </div>

    <div class="main-content">
        <div class="productos-grid" id="lista-productos"></div>
        <div class="carrito-panel">
            <h3>Carrito de Venta</h3>
            <div id="items-carrito"></div>
            <div style="border-top: 1px solid #334155; padding-top: 15px;">
                <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                    <span>Total:</span>
                    <h2 id="total-venta" style="margin:0;">$0.00</h2>
                </div>
                <button class="btn-venta" onclick="procesarVenta()">FINALIZAR VENTA</button>
            </div>
        </div>
    </div>

    <script>
        const sb = window.sb;
        let user = null;
        let carrito = [];

        async function init() {
            user = await validarAccesoGlobal();
            if (user) {
                document.getElementById('userName').innerText = user.nombre || user.email;
                await cargarProductos();
            }
        }

        async function cargarProductos() {
            const ownerId = user.rol === 'admin' ? user.id : user.admin_id;
            
            // CORRECCIÓN: Columna 'eliminada' (con a) según tu esquema
            const { data, error } = await sb.from('productos')
                .select('*')
                .eq('owner_id', ownerId)
                .eq('eliminada', false) 
                .gt('stock', 0);
            
            if (error) { console.error(error); return; }

            const container = document.getElementById('lista-productos');
            // Aseguramos que data no sea null con (data || [])
            container.innerHTML = (data || []).map(p => `
                <div class="producto-card" onclick="agregarCarrito('${p.id}', '${p.nombre}', ${p.precio})">
                    <div style="font-weight: bold; margin-bottom: 5px;">${p.nombre}</div>
                    <div style="color: var(--success); font-weight: bold;">$${p.precio.toFixed(2)}</div>
                    <small style="color: #94a3b8;">Disp: ${p.stock}</small>
                </div>
            `).join('');
        }

        function agregarCarrito(id, nombre, precio) {
            const item = carrito.find(i => i.id === id);
            if (item) item.cantidad++;
            else carrito.push({ id, nombre, precio, cantidad: 1 });
            actualizarUI();
        }

        function actualizarUI() {
            const container = document.getElementById('items-carrito');
            let total = 0;
            container.innerHTML = carrito.map(i => {
                total += i.precio * i.cantidad;
                return `<div style="display:flex; justify:space-between; margin-bottom:8px; font-size:14px;">
                    <span>${i.nombre} x${i.cantidad}</span>
                    <span>$${(i.precio * i.cantidad).toFixed(2)}</span>
                </div>`;
            }).join('');
            document.getElementById('total-venta').innerText = `$${total.toFixed(2)}`;
        }

        async function procesarVenta() {
            if (carrito.length === 0) return;
            alert("Venta registrada (Lógica de base de datos activa)");
            carrito = [];
            actualizarUI();
            await cargarProductos();
        }

        async function cerrarSesion() { await sb.auth.signOut(); window.location.href = 'index.html'; }
        init();
    </script>
</body>
</html>
