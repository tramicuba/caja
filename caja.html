<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Caja Registradora | Nostalgia Cubana</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config-auth.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --primary: #3b82f6;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --dark: #0f172a;
            --card: #1e293b;
            --border: #334155;
            --text-muted: #94a3b8;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--dark); 
            color: white; 
            display: flex; 
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            background: var(--card);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease;
        }

        .sidebar-header { padding: 30px 20px; text-align: center; }
        .sidebar-header i { font-size: 2rem; color: var(--primary); margin-bottom: 10px; }
        
        .nav-links { flex: 1; padding: 10px; }
        .nav-links a {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            color: var(--text-muted);
            text-decoration: none;
            border-radius: 10px;
            margin-bottom: 5px;
            transition: 0.2s;
        }
        .nav-links a:hover, .nav-links a.active {
            background: rgba(59, 130, 246, 0.1);
            color: white;
        }
        .nav-links i { width: 25px; margin-right: 10px; }

        /* Main Content */
        .main-content {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 380px;
            height: 100vh;
        }

        /* Sección Productos */
        .products-section {
            padding: 20px;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            border-right: 1px solid var(--border);
        }

        .search-bar {
            position: sticky;
            top: 0;
            z-index: 10;
            background: var(--dark);
            padding-bottom: 20px;
        }

        .search-bar input {
            width: 100%;
            padding: 15px 20px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 15px;
            color: white;
            font-size: 1rem;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
        }

        .product-card {
            background: var(--card);
            padding: 20px;
            border-radius: 18px;
            border: 1px solid var(--border);
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
        }
        .product-card:hover { transform: translateY(-3px); border-color: var(--primary); }
        .product-card .price { font-weight: 700; color: var(--success); display: block; margin-top: 5px; }
        .product-card .stock { font-size: 0.75rem; color: var(--text-muted); }

        /* Sección Carrito */
        .cart-section {
            background: #161e2d;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .cart-items { flex: 1; overflow-y: auto; }
        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
        }

        .cart-total {
            padding-top: 20px;
            border-top: 2px solid var(--border);
        }

        .total-row {
            display: flex;
            justify-content: space-between;
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 20px;
        }

        .btn-action {
            width: 100%;
            padding: 18px;
            border-radius: 15px;
            border: none;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .btn-pay { background: var(--success); color: white; }
        .btn-pay:disabled { opacity: 0.5; cursor: not-allowed; }

        .btn-turno { background: var(--warning); color: white; }

        /* Responsive */
        @media (max-width: 1024px) {
            .main-content { grid-template-columns: 1fr; }
            .cart-section { position: fixed; bottom: 0; left: 0; width: 100%; height: 60px; padding: 10px; z-index: 100; flex-direction: row; align-items: center; }
            .sidebar { display: none; }
        }

        /* Notificaciones */
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 10px;
            background: var(--card);
            border-left: 5px solid var(--primary);
            box-shadow: 0 10px 15px rgba(0,0,0,0.3);
            animation: slideIn 0.3s ease-out;
            z-index: 1000;
        }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
    </style>
</head>
<body>

    <nav class="sidebar">
        <div class="sidebar-header">
            <i class="fas fa-cash-register"></i>
            <h2>Caja</h2>
        </div>
        <div class="nav-links">
            <a href="#" class="active"><i class="fas fa-shopping-cart"></i> Nueva Venta</a>
            <a href="mis-ventas.html"><i class="fas fa-history"></i> Mis Ventas</a>
            <a href="mis-turnos.html"><i class="fas fa-clock"></i> Mis Turnos</a>
            <a href="#" onclick="cerrarSesion()"><i class="fas fa-sign-out-alt"></i> Salir</a>
        </div>
    </nav>

    <main class="main-content">
        <section class="products-section">
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="Buscar producto o código..." oninput="filtrarProductos()">
            </div>
            <div id="productsGrid" class="products-grid">
                </div>
        </section>

        <section class="cart-section">
            <div style="margin-bottom: 20px;">
                <h3>Venta Actual</h3>
                <p id="vendedorName" style="color: var(--text-muted); font-size: 0.8rem;"></p>
            </div>
            
            <div id="cartItems" class="cart-items">
                </div>

            <div class="cart-total">
                <div class="total-row">
                    <span>Total</span>
                    <span id="totalAmount">$0.00</span>
                </div>
                
                <button id="btnPay" class="btn-action btn-pay" onclick="procesarVenta()" disabled>
                    <i class="fas fa-check-circle"></i> Finalizar Venta
                </button>

                <button id="btnTurno" class="btn-action btn-turno" onclick="toggleTurno()">
                    <i class="fas fa-door-open"></i> <span id="turnoText">Abrir Turno</span>
                </button>
            </div>
        </section>
    </main>

    <script>
        const sb = window.supabaseInstance;
        let localProducts = [];
        let cart = [];
        let currentUser = null;
        let activeTurnoId = null;

        async function init() {
            const access = await validarAccesoGlobal();
            if (!access) return;
            
            currentUser = access.user;
            document.getElementById('vendedorName').innerText = `Atiende: ${currentUser.email}`;
            
            await cargarProductos();
            await verificarTurnoAbierto();
        }

        async function cargarProductos() {
            const { data, error } = await sb
                .from('productos')
                .select('*')
                .gt('stock', 0)
                .order('nombre');
            
            if (data) {
                localProducts = data;
                renderProductos(data);
            }
        }

        function renderProductos(items) {
            const grid = document.getElementById('productsGrid');
            grid.innerHTML = items.map(p => `
                <div class="product-card" onclick="addToCart('${p.id}')">
                    <strong>${p.nombre}</strong>
                    <span class="price">$${p.precio.toFixed(2)}</span>
                    <span class="stock">Disponibles: ${p.stock}</span>
                </div>
            `).join('');
        }

        function filtrarProductos() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = localProducts.filter(p => p.nombre.toLowerCase().includes(query));
            renderProductos(filtered);
        }

        function addToCart(id) {
            if (!activeTurnoId) {
                showToast("Debes abrir turno antes de vender", "warning");
                return;
            }

            const prod = localProducts.find(p => p.id == id);
            const inCart = cart.find(item => item.id == id);

            if (inCart) {
                if (inCart.cantidad < prod.stock) inCart.cantidad++;
                else showToast("Stock máximo alcanzado", "warning");
            } else {
                cart.push({ ...prod, cantidad: 1 });
            }
            updateCartUI();
        }

        function updateCartUI() {
            const list = document.getElementById('cartItems');
            let total = 0;

            list.innerHTML = cart.map(item => {
                const subtotal = item.cantidad * item.precio;
                total += subtotal;
                return `
                    <div class="cart-item">
                        <div>
                            <strong>${item.nombre}</strong><br>
                            <small>${item.cantidad} x $${item.precio.toFixed(2)}</small>
                        </div>
                        <div>
                            <strong>$${subtotal.toFixed(2)}</strong>
                            <i class="fas fa-times-circle" style="color:var(--danger); margin-left:10px; cursor:pointer" onclick="removeFromCart('${item.id}')"></i>
                        </div>
                    </div>
                `;
            }).join('');

            document.getElementById('totalAmount').innerText = `$${total.toFixed(2)}`;
            document.getElementById('btnPay').disabled = cart.length === 0;
        }

        function removeFromCart(id) {
            cart = cart.filter(i => i.id != id);
            updateCartUI();
        }

        async function procesarVenta() {
            try {
                const btn = document.getElementById('btnPay');
                btn.disabled = true;
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Procesando...';

                for (const item of cart) {
                    // 1. Registrar Venta
                    const { error: vError } = await sb.from('ventas').insert({
                        producto_id: item.id,
                        vendedor_id: currentUser.id,
                        cantidad: item.cantidad,
                        precio_total: item.cantidad * item.precio,
                        costo_unitario: item.precio_compra,
                        owner_id: item.owner_id,
                        turno_id: activeTurnoId
                    });
                    if (vError) throw vError;

                    // 2. Descontar Stock
                    const { error: sError } = await sb.rpc('restar_stock', {
                        row_id: item.id,
                        cantidad_restar: item.cantidad
                    });
                    if (sError) throw sError;
                }

                showToast("Venta realizada con éxito");
                cart = [];
                updateCartUI();
                await cargarProductos();

            } catch (err) {
                showToast("Error en la venta: " + err.message, "danger");
            } finally {
                const btn = document.getElementById('btnPay');
                btn.innerHTML = '<i class="fas fa-check-circle"></i> Finalizar Venta';
            }
        }

        // Lógica de Turnos
        async function verificarTurnoAbierto() {
            const { data } = await sb
                .from('turnos')
                .select('id')
                .eq('vendedor_id', currentUser.id)
                .is('fecha_cierre', null)
                .single();

            if (data) {
                activeTurnoId = data.id;
                updateTurnoUI(true);
            }
        }

        async function toggleTurno() {
            if (activeTurnoId) {
                if (confirm("¿Cerrar turno actual?")) {
                    await sb.from('turnos').update({ fecha_cierre: new Date().toISOString() }).eq('id', activeTurnoId);
                    activeTurnoId = null;
                    updateTurnoUI(false);
                }
            } else {
                const { data } = await sb.from('turnos').insert({ vendedor_id: currentUser.id }).select().single();
                activeTurnoId = data.id;
                updateTurnoUI(true);
            }
        }

        function updateTurnoUI(isOpened) {
            document.getElementById('turnoText').innerText = isOpened ? "Cerrar Turno" : "Abrir Turno";
            document.getElementById('btnTurno').style.background = isOpened ? "var(--danger)" : "var(--warning)";
        }

        function showToast(msg, type = "success") {
            const t = document.createElement('div');
            t.className = 'toast';
            t.innerText = msg;
            if (type === "danger") t.style.borderLeftColor = "var(--danger)";
            if (type === "warning") t.style.borderLeftColor = "var(--warning)";
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 3000);
        }

        async function cerrarSesion() {
            await sb.auth.signOut();
            window.location.href = 'index.html';
        }

        init();
    </script>
</body>
</html>
