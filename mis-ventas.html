<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mis Ventas | Dependiente</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config-auth.js"></script>
</head>
<body style="background:#0f172a; color:white; font-family:sans-serif; padding:20px;">
    <h1>Mis Ventas del Turno</h1>
    <table style="width:100%; text-align:left;">
        <thead><tr><th>Fecha</th><th>Total</th></tr></thead>
        <tbody id="ventas-body"></tbody>
    </table>
    <script>
        const sb = window.sb;
        async function init() {
            const user = await validarAccesoGlobal();
            if (user) {
                const { data } = await sb.from('ventas').select('*').eq('vendedor_id', user.id).order('created_at', {ascending: false});
                document.getElementById('ventas-body').innerHTML = data.map(v => `
                    <tr><td>${new Date(v.created_at).toLocaleString()}</td><td>$${v.precio_total}</td></tr>
                `).join('');
            }
        }
        init();
    </script>
</body>
</html>
