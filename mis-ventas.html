<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mis Ventas</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config-auth.js"></script>
</head>
<body style="background:#0f172a; color:white; font-family:sans-serif; padding:20px;">
    <h3>Historial de Ventas</h3>
    <div id="historial"></div>
    <script>
        const sb = window.sb;
        async function init() {
            const user = await validarAccesoGlobal();
            if (user) {
                const { data } = await sb.from('ventas')
                    .select('*')
                    .eq('vendedor_id', user.id)
                    .order('created_at', { ascending: false });
                
                document.getElementById('historial').innerHTML = (data || []).map(v => `
                    <div style="background:#1e293b; padding:10px; margin-bottom:5px; border-radius:5px;">
                        ${new Date(v.created_at).toLocaleTimeString()} - Total: <b>$${v.precio_total}</b>
                    </div>
                `).join('');
            }
        }
        init();
    </script>
</body>
</html>
