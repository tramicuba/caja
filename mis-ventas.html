<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Ventas | Nostalgia Cubana</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config-auth.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --primary: #3b82f6;
            --success: #10b981;
            --danger: #ef4444;
            --dark: #0f172a;
            --card: #1e293b;
            --border: #334155;
            --text-muted: #94a3b8;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--dark); color: white; display: flex; height: 100vh; }

        /* Sidebar */
        .sidebar { width: 260px; background: var(--card); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .sidebar-header { padding: 30px 20px; text-align: center; }
        .nav-links { flex: 1; padding: 10px; }
        .nav-links a {
            display: flex; align-items: center; padding: 12px 15px; color: var(--text-muted);
            text-decoration: none; border-radius: 10px; margin-bottom: 5px;
        }
        .nav-links a:hover, .nav-links a.active { background: rgba(59, 130, 246, 0.1); color: white; }
        .nav-links i { width: 25px; margin-right: 10px; }

        /* Contenido Principal */
        .main-content { flex: 1; overflow-y: auto; padding: 30px; }
        .header-flex { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }

        .table-container { background: var(--card); border-radius: 15px; border: 1px solid var(--border); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        th { background: rgba(255,255,255,0.03); padding: 15px 20px; text-align: left; color: var(--text-muted); font-size: 0.8rem; text-transform: uppercase; }
        td { padding: 15px 20px; border-bottom: 1px solid var(--border); font-size: 0.9rem; }

        .btn-anular { 
            background: rgba(239, 68, 68, 0.1); color: var(--danger); 
            border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 0.8rem;
        }
        .btn-anular:hover { background: var(--danger); color: white; }
        
        .venta-eliminada { text-decoration: line-through; opacity: 0.5; }
    </style>
</head>
<body>

    <nav class="sidebar">
        <div class="sidebar-header"><h3>Nostalgia POS</h3></div>
        <div class="nav-links">
            <a href="caja.html"><i class="fas fa-cash-register"></i> Nueva Venta</a>
            <a href="#" class="active"><i class="fas fa-history"></i> Mis Ventas</a>
            <a href="mis-turnos.html"><i class="fas fa-clock"></i> Mis Turnos</a>
            <a href="#" onclick="cerrarSesion()"><i class="fas fa-sign-out-alt"></i> Salir</a>
        </div>
    </nav>

    <main class="main-content">
        <div class="header-flex">
            <h1>Mis Ventas del Día</h1>
            <div id="resumenVentas" style="font-weight: 600; color: var(--success);">Total: $0.00</div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Hora</th>
                        <th>Producto</th>
                        <th>Cant.</th>
                        <th>Total</th>
                        <th>Acción</th>
                    </tr>
                </thead>
                <tbody id="ventasBody">
                    </tbody>
            </table>
        </div>
    </main>

    <script>
        const sb = window.supabaseInstance;
        let currentUser = null;

        async function init() {
            const access = await validarAccesoGlobal();
            if (!access) return;
            currentUser = access.user;
            await cargarVentas();
        }

        async function cargarVentas() {
            // Obtenemos solo las ventas del usuario actual hoy
            const hoy = new Date().toISOString().split('T')[0];

            const { data, error } = await sb
                .from('ventas')
                .select(`
                    *,
                    productos:producto_id(nombre)
                `)
                .eq('vendedor_id', currentUser.id)
                .gte('created_at', hoy)
                .order('created_at', { ascending: false });

            if (error) return console.error(error);
            renderVentas(data);
        }

        function renderVentas(ventas) {
            const tbody = document.getElementById('ventasBody');
            let totalAcumulado = 0;

            tbody.innerHTML = ventas.map(v => {
                if (!v.eliminada) totalAcumulado += v.precio_total;
                
                return `
                    <tr class="${v.eliminada ? 'venta-eliminada' : ''}">
                        <td>${new Date(v.created_at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</td>
                        <td>${v.productos?.nombre || 'Producto eliminado'}</td>
                        <td>${v.cantidad}</td>
                        <td>$${v.precio_total.toFixed(2)}</td>
                        <td>
                            ${!v.eliminada ? `<button class="btn-anular" onclick="anularVenta(${v.id}, ${v.producto_id}, ${v.cantidad})">Anular</button>` : 'Anulada'}
                        </td>
                    </tr>
                `;
            }).join('');

            document.getElementById('resumenVentas').innerText = `Total: $${totalAcumulado.toFixed(2)}`;
        }

        async function anularVenta(id, productoId, cantidad) {
            if (!confirm("¿Seguro que deseas anular esta venta? El stock será devuelto al inventario.")) return;

            // 1. Marcar como eliminada
            await sb.from('ventas').update({ eliminada: true }).eq('id', id);

            // 2. Devolver stock (Obtener stock actual primero)
            const { data: prod } = await sb.from('productos').select('stock').eq('id', productoId).single();
            await sb.from('productos').update({ stock: prod.stock + cantidad }).eq('id', productoId);

            alert("Venta anulada correctamente");
            cargarVentas();
        }

        async function cerrarSesion() {
            await sb.auth.signOut();
            window.location.href = 'index.html';
        }

        init();
    </script>
</body>
</html>
