<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login Maestro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config-auth.js"></script>
</head>
<body style="background:#0f172a; display:flex; justify-content:center; align-items:center; height:100vh;">
    <div style="background:#1e293b; padding:40px; border-radius:15px; color:white;">
        <h2>Acceso Maestro</h2>
        <input type="email" id="email" style="display:block; margin-bottom:10px;">
        <input type="password" id="pass" style="display:block; margin-bottom:10px;">
        <button onclick="login()">Entrar</button>
    </div>
    <script>
        const sb = window.sb;
        async function login() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
            if(!error) window.location.href = 'superadmin.html';
        }
    </script>
</body>
</html>
