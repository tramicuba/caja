<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Acceso Maestro | Nostalgia Cubana</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="config-auth.js"></script>

    <style>
        :root {
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --dark: #0f172a;
            --card: #1e293b;
            --error: #ef4444;
            --text-muted: #94a3b8;
            --border: #334155;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--dark);
            color: white;
            display: flex;
            height: 100vh;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: hidden;
        }

        .login-card {
            background: var(--card);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 400px;
            border: 1px solid var(--border);
            text-align: center;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-area {
            margin-bottom: 30px;
        }

        .logo-area i {
            font-size: 3rem;
            color: var(--primary);
            margin-bottom: 15px;
        }

        h2 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 0.875rem;
            margin-bottom: 30px;
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 8px;
            color: var(--text-muted);
            padding-left: 4px;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
            background: rgba(15, 23, 42, 0.8);
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-login:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
        }

        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .error-msg {
            background: rgba(239, 68, 68, 0.1);
            color: var(--error);
            padding: 12px;
            border-radius: 8px;
            font-size: 0.875rem;
            margin-top: 20px;
            display: none;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .back-link {
            display: inline-block;
            margin-top: 25px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.875rem;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: white;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo-area">
            <i class="fas fa-user-shield"></i>
            <h2>Super Admin</h2>
            <p class="subtitle">Área Restringida - Nostalgia Cubana</p>
        </div>

        <form id="artyLoginForm">
            <div class="form-group">
                <label>Correo Electrónico</label>
                <input type="email" id="email" placeholder="admin@maestro.com" required>
            </div>
            <div class="form-group">
                <label>Contraseña</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            
            <button type="submit" id="loginBtn" class="btn-login">
                <span>Ingresar al Sistema</span>
                <i class="fas fa-arrow-right"></i>
            </button>
        </form>

        <div id="error" class="error-msg"></div>
        
        <a href="index.html" class="back-link">
            <i class="fas fa-chevron-left"></i> Volver al inicio
        </a>
    </div>

    <script>
        const sb = window.supabaseInstance;

        async function checkSession() {
            const { data: { user } } = await sb.auth.getUser();
            if (user) {
                const { data: profile } = await sb
                    .from('perfiles')
                    .select('rol')
                    .eq('id', user.id)
                    .single();
                
                if (profile?.rol === 'superadmin') {
                    window.location.href = 'superadmin.html';
                }
            }
        }

        document.getElementById('artyLoginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('error');
            const btn = document.getElementById('loginBtn');

            errorDiv.style.display = 'none';
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Autenticando...';

            try {
                const { data: authData, error: authError } = await sb.auth.signInWithPassword({ 
                    email, 
                    password 
                });

                if (authError) throw new Error("Acceso denegado. Verifique sus credenciales.");

                const { data: profile, error: profileError } = await sb
                    .from('perfiles')
                    .select('rol, eliminado')
                    .eq('id', authData.user.id)
                    .single();

                if (profileError || !profile) throw new Error("No se encontró el perfil de administrador.");
                
                if (profile.eliminado) {
                    await sb.auth.signOut();
                    throw new Error("Esta cuenta maestra ha sido desactivada.");
                }

                if (profile.rol !== 'superadmin') {
                    await sb.auth.signOut();
                    throw new Error("No tiene privilegios de Super Administrador.");
                }

                // Éxito
                window.location.href = 'superadmin.html';

            } catch (err) {
                errorDiv.innerText = err.message;
                errorDiv.style.display = 'block';
                btn.disabled = false;
                btn.innerHTML = '<span>Ingresar al Sistema</span><i class="fas fa-arrow-right"></i>';
            }
        });

        // Verificar si ya hay una sesión activa al cargar
        checkSession();
    </script>
</body>
</html>
