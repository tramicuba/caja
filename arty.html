<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Acceso Super Admin | Nostalgia Cubana</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config-auth.js"></script>
    <style>
        :root { --primary: #3b82f6; --dark: #0f172a; --error: #ef4444; --success: #10b981; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--dark);
            color: white;
            display: flex;
            height: 100vh;
            margin: 0;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-card {
            background: #1e293b;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 380px;
        }
        h2 {
            text-align: center;
            margin-bottom: 10px;
            font-weight: 300;
            letter-spacing: 1px;
        }
        .sub {
            text-align: center;
            font-size: 0.8rem;
            color: #94a3b8;
            margin-bottom: 30px;
        }
        .input-group { margin-bottom: 20px; position: relative; }
        label { display: block; margin-bottom: 8px; font-size: 0.85rem; color: #94a3b8; }
        input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #334155;
            background: #0f172a;
            color: white;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }
        button:hover { background: #2563eb; transform: translateY(-2px); }
        .error-msg {
            color: var(--error);
            font-size: 0.8rem;
            text-align: center;
            margin-top: 15px;
            display: none;
            background: rgba(239,68,68,0.1);
            padding: 10px;
            border-radius: 5px;
        }
        .info {
            text-align: center;
            font-size: 0.7rem;
            margin-top: 20px;
            color: var(--text-muted);
        }
        .password-wrapper {
            position: relative;
        }
        .password-wrapper input {
            padding-right: 45px;
        }
        .toggle-password {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #94a3b8;
            cursor: pointer;
            font-size: 1.2rem;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .toggle-password:hover { color: var(--primary); }
        @media (max-width: 480px) {
            .login-card { padding: 25px; }
        }
    </style>
</head>
<body>
<div class="login-card">
    <h2>🔐 Acceso Restringido</h2>
    <div class="sub">Super Administrador</div>
    <div class="input-group">
        <label>Correo Electrónico</label>
        <input type="email" id="email" placeholder="superadmin@ejemplo.com">
    </div>
    <div class="input-group">
        <label>Contraseña</label>
        <div class="password-wrapper">
            <input type="password" id="password" placeholder="••••••••">
            <button type="button" class="toggle-password" id="togglePasswordBtn" tabindex="-1">👁️</button>
        </div>
    </div>
    <button id="loginBtn">Iniciar Sesión</button>
    <div id="error" class="error-msg"></div>
    <div class="info">Acceso exclusivo para Super Administrador</div>
</div>

<script>
    (function() {
        const URL = 'https://pkwfqpnwnrcmbncwkwew.supabase.co';
        const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBrd2ZxcG53bnJjbWJuY3drd2V3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4NTAxODEsImV4cCI6MjA5MzQyNjE4MX0._8QVetaDX1buaLN6kKpQatH8hGas_VL-zCuyDk4B3s4';
        if (!window.supabaseInstance) window.supabaseInstance = window.supabase.createClient(URL, KEY);
    })();

    const sb = window.supabaseInstance;

    // Verificar si ya hay una sesión activa con rol superadmin
    async function checkExistingSession() {
        const { data: { user } } = await sb.auth.getUser();
        if (user) {
            const { data: profile } = await sb.from('perfiles').select('rol').eq('id', user.id).single();
            if (profile && profile.rol === 'superadmin') {
                window.location.href = 'superadmin.html';
                return true;
            }
        }
        return false;
    }

    // Mostrar/ocultar contraseña
    const toggleBtn = document.getElementById('togglePasswordBtn');
    const passwordInput = document.getElementById('password');
    if (toggleBtn) {
        toggleBtn.addEventListener('click', function(e) {
            e.preventDefault();
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            this.textContent = type === 'password' ? '👁️' : '🙈';
        });
    }

    document.getElementById('loginBtn').addEventListener('click', async () => {
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const errorDiv = document.getElementById('error');
        const btn = document.getElementById('loginBtn');

        errorDiv.style.display = 'none';
        btn.disabled = true;
        btn.innerText = "Verificando...";

        try {
            const { data: authData, error: authError } = await sb.auth.signInWithPassword({ email, password });
            if (authError) throw new Error("Credenciales inválidas.");

            const { data: profile, error: profileError } = await sb
                .from('perfiles')
                .select('rol, eliminado')
                .eq('id', authData.user.id)
                .single();

            if (profileError || !profile) throw new Error("Error al obtener perfil.");

            if (profile.eliminado === true) {
                await sb.auth.signOut();
                throw new Error("Esta cuenta ha sido desactivada por el administrador.");
            }

            if (profile.rol !== 'superadmin') {
                await sb.auth.signOut();
                throw new Error("No tienes permisos de Super Administrador.");
            }

            // Redirigir al panel de super admin
            window.location.href = 'superadmin.html';
        } catch (err) {
            errorDiv.innerText = err.message;
            errorDiv.style.display = 'block';
            btn.innerText = "Iniciar Sesión";
            btn.disabled = false;
        }
    });

    // Si ya está logueado como superadmin, redirigir directamente
    checkExistingSession();
</script>
</body>
</html>
