<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reportes | Nostalgia Cubana</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config-auth.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --primary: #3b82f6;
            --success: #10b981;
            --danger: #ef4444;
            --dark: #0f172a;
            --card: #1e293b;
            --border: #334155;
            --text-muted: #94a3b8;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--dark); color: white; display: flex; height: 100vh; }

        /* Sidebar */
        .sidebar { width: 260px; background: var(--card); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .sidebar-header { padding: 30px 20px; text-align: center; }
        .nav-links { flex: 1; padding: 10px; }
        .nav-links a {
            display: flex; align-items: center; padding: 12px 15px; color: var(--text-muted);
            text-decoration: none; border-radius: 10px; margin-bottom: 5px;
        }
        .nav-links a:hover, .nav-links a.active { background: rgba(59, 130, 246, 0.1); color: white; }
        .nav-links i { width: 25px; margin-right: 10px; }

        /* Main Content */
        .main-content { flex: 1; overflow-y: auto; padding: 30px; }
        
        /* Filtros */
        .filters-bar { 
            background: var(--card); padding: 20px; border-radius: 15px; 
            margin-bottom: 30px; display: flex; gap: 20px; align-items: flex-end;
            border: 1px solid var(--border);
        }
        .filter-group { display: flex; flex-direction: column; gap: 8px; }
        .filter-group label { font-size: 0.75rem; color: var(--text-muted); font-weight: 600; }
        input[type="date"] {
            padding: 10px; background: #0f172a; border: 1px solid var(--border);
            border-radius: 8px; color: white; color-scheme: dark;
        }

        /* Resumen Cards */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { 
            background: var(--card); padding: 25px; border-radius: 20px; 
            border: 1px solid var(--border); position: relative; overflow: hidden;
        }
        .stat-card h3 { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 10px; }
        .stat-card .value { font-size: 1.8rem; font-weight: 700; }
        .stat-card i { position: absolute; right: 20px; top: 20px; font-size: 1.5rem; opacity: 0.2; }

        /* Tabla */
        .table-container { background: var(--card); border-radius: 20px; border: 1px solid var(--border); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        th { background: rgba(255,255,255,0.03); padding: 15px 20px; text-align: left; color: var(--text-muted); font-size: 0.8rem; }
        td { padding: 15px 20px; border-bottom: 1px solid var(--border); font-size: 0.9rem; }

        .btn { padding: 10px 20px; border-radius: 10px; border: none; cursor: pointer; font-weight: 600; transition: 0.3s; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-export { background: transparent; border: 1px solid var(--border); color: white; }
        .btn-export:hover { background: var(--border); }

    </style>
</head>
<body>

    <nav class="sidebar">
        <div class="sidebar-header">
            <h3>Finanzas</h3>
        </div>
        <div class="nav-links">
            <a href="admin.html"><i class="fas fa-chart-line"></i> Dashboard</a>
            <a href="gestion-stock.html"><i class="fas fa-cubes"></i> Productos</a>
            <a href="gestion-dependientes.html"><i class="fas fa-users"></i> Vendedores</a>
            <a href="#" class="active"><i class="fas fa-file-invoice-dollar"></i> Reportes</a>
            <a href="#" onclick="cerrarSesion()"><i class="fas fa-sign-out-alt"></i> Salir</a>
        </div>
    </nav>

    <main class="main-content">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
            <h1>Análisis de Ventas</h1>
            <button class="btn btn-export" onclick="exportarCSV()">
                <i class="fas fa-download"></i> Exportar CSV
            </button>
        </div>

        <div class="filters-bar">
            <div class="filter-group">
                <label>Desde</label>
                <input type="date" id="fecha_inicio">
            </div>
            <div class="filter-group">
                <label>Hasta</label>
                <input type="date" id="fecha_fin">
            </div>
            <button class="btn btn-primary" onclick="cargarReporte()">
                <i class="fas fa-sync-alt"></i> Filtrar
            </button>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <h3>Venta Bruta</h3>
                <div class="value" id="total_venta">$0.00</div>
                <i class="fas fa-cash-register"></i>
            </div>
            <div class="stat-card">
                <h3>Costo de Inversión</h3>
                <div class="value" id="total_costo" style="color: var(--danger)">$0.00</div>
                <i class="fas fa-shuttle-van"></i>
            </div>
            <div class="stat-card">
                <h3>Ganancia Neta</h3>
                <div class="value" id="total_ganancia" style="color: var(--success)">$0.00</div>
                <i class="fas fa-hand-holding-usd"></i>
            </div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Fecha y Hora</th>
                        <th>Producto</th>
                        <th>Cant.</th>
                        <th>Venta</th>
                        <th>Costo</th>
                        <th>Ganancia</th>
                        <th>Vendedor</th>
                    </tr>
                </thead>
                <tbody id="reporteBody">
                    </tbody>
            </table>
        </div>
    </main>

    <script>
        const sb = window.supabaseInstance;
        let currentUser = null;
        let currentVentas = [];

        async function init() {
            const access = await validarAccesoGlobal();
            if (!access) return;
            currentUser = access.user;

            // Establecer fechas por defecto (Hoy)
            const hoy = new Date().toISOString().split('T')[0];
            document.getElementById('fecha_inicio').value = hoy;
            document.getElementById('fecha_fin').value = hoy;

            await cargarReporte();
        }

        async function cargarReporte() {
            const inicio = document.getElementById('fecha_inicio').value;
            const fin = document.getElementById('fecha_fin').value;

            // Consultar ventas con los datos del producto (para el costo)
            const { data, error } = await sb
                .from('ventas')
                .select(`
                    id, created_at, cantidad, precio_total, 
                    perfiles:vendedor_id(email),
                    productos:producto_id(nombre, precio_compra)
                `)
                .eq('owner_id', currentUser.id)
                .eq('eliminada', false)
                .gte('created_at', inicio + 'T00:00:00')
                .lte('created_at', fin + 'T23:59:59')
                .order('created_at', { ascending: false });

            if (error) {
                console.error(error);
                return;
            }

            currentVentas = data;
            renderizarReporte();
        }

        function renderizarReporte() {
            let totalVenta = 0;
            let totalCosto = 0;
            let totalGanancia = 0;

            const tbody = document.getElementById('reporteBody');
            tbody.innerHTML = currentVentas.map(v => {
                const costoUnitario = v.productos?.precio_compra || 0;
                const costoTotal = costoUnitario * v.cantidad;
                const ganancia = v.precio_total - costoTotal;

                totalVenta += v.precio_total;
                totalCosto += costoTotal;
                totalGanancia += ganancia;

                return `
                    <tr>
                        <td style="color: var(--text-muted)">${new Date(v.created_at).toLocaleString()}</td>
                        <td><strong>${v.productos?.nombre || 'Desconocido'}</strong></td>
                        <td>${v.cantidad}</td>
                        <td>$${v.precio_total.toFixed(2)}</td>
                        <td style="color: var(--danger)">$${costoTotal.toFixed(2)}</td>
                        <td style="color: var(--success); font-weight: 600;">$${ganancia.toFixed(2)}</td>
                        <td style="font-size: 0.8rem;">${v.perfiles?.email.split('@')[0]}</td>
                    </tr>
                `;
            }).join('');

            document.getElementById('total_venta').innerText = `$${totalVenta.toFixed(2)}`;
            document.getElementById('total_costo').innerText = `$${totalCosto.toFixed(2)}`;
            document.getElementById('total_ganancia').innerText = `$${totalGanancia.toFixed(2)}`;
        }

        function exportarCSV() {
            if (currentVentas.length === 0) return alert("No hay datos para exportar.");
            
            let csv = "Fecha;Producto;Cantidad;Venta;Costo;Ganancia;Vendedor\n";
            currentVentas.forEach(v => {
                const costoTotal = (v.productos?.precio_compra || 0) * v.cantidad;
                const ganancia = v.precio_total - costoTotal;
                csv += `${new Date(v.created_at).toLocaleString()};${v.productos?.nombre};${v.cantidad};${v.precio_total};${costoTotal};${ganancia};${v.perfiles?.email}\n`;
            });

            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.setAttribute('hidden', '');
            a.setAttribute('href', url);
            a.setAttribute('download', `Reporte_${new Date().toLocaleDateString()}.csv`);
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }

        async function cerrarSesion() {
            await sb.auth.signOut();
            window.location.href = 'index.html';
        }

        init();
    </script>
</body>
</html>
