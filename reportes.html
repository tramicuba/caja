<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Reportes | Nostalgia Cubana</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config-auth.js"></script>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; padding: 20px; }
        .stat-box { background: #1e293b; padding: 20px; border-radius: 10px; display: inline-block; min-width: 200px; }
    </style>
</head>
<body>
    <h1>Reporte General</h1>
    <div class="stat-box">
        <p>Total Vendido</p>
        <h2 id="total-general">$0.00</h2>
    </div>
    <script>
        const sb = window.sb;
        async function init() {
            const user = await validarAccesoGlobal();
            if (user) {
                const { data } = await sb.from('ventas').select('precio_total').eq('owner_id', user.id).eq('eliminada', false);
                const total = data.reduce((acc, v) => acc + v.precio_total, 0);
                document.getElementById('total-general').innerText = `$${total.toFixed(2)}`;
            }
        }
        init();
    </script>
</body>
</html>
