<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mis Turnos</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config-auth.js"></script>
</head>
<body style="background:#0f172a; color:white; font-family:sans-serif; padding:20px;">
    <h1>Registro de Turnos</h1>
    <div id="turnos-list"></div>
    <script>
        const sb = window.sb;
        async function init() {
            const user = await validarAccesoGlobal();
            if(user) {
                const { data } = await sb.from('turnos').select('*').eq('usuario_id', user.id).order('fecha_inicio', {ascending: false});
                document.getElementById('turnos-list').innerHTML = data.map(t => `
                    <p>Inicio: ${t.fecha_inicio} | Fin: ${t.fecha_fin || 'Abierto'}</p>
                `).join('');
            }
        }
        init();
    </script>
</body>
</html>
