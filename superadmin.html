<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SuperAdmin | Nostalgia Cubana</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config-auth.js"></script>
</head>
<body style="background:#f1f5f9; color:#1e293b; font-family:sans-serif; padding:20px;">
    <h1 style="background:#0f172a; color:white; padding:20px;">Soporte Técnico - Gestión de Clientes</h1>
    <table style="width:100%; border-collapse:collapse; background:white;">
        <thead style="background:#334155; color:white;"><tr><th>Email</th><th>Vencimiento</th><th>Acciones</th></tr></thead>
        <tbody id="admin-list"></tbody>
    </table>
    <script>
        const sb = window.sb;
        async function init() {
            const user = await validarAccesoGlobal();
            if(user && user.rol === 'superadmin') {
                const { data } = await sb.from('perfiles').select('*').eq('rol', 'admin');
                document.getElementById('admin-list').innerHTML = data.map(a => `
                    <tr>
                        <td>${a.email}</td>
                        <td>${a.vencimiento}</td>
                        <td><button onclick="extender('${a.id}')">Extender 30 días</button></td>
                    </tr>
                `).join('');
            }
        }
        async function extender(id) {
            alert('Extendido para ' + id);
            // Aquí iría el update de la fecha
        }
        init();
    </script>
</body>
</html>
