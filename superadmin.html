<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel Maestro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config-auth.js"></script>
</head>
<body style="background:#f1f5f9; font-family:sans-serif; padding:20px;">
    <h1 style="color:#0f172a;">Soporte Técnico NC</h1>
    <div id="admins" style="background:white; border-radius:10px; padding:20px;"></div>
    <script>
        const sb = window.sb;
        async function init() {
            const user = await validarAccesoGlobal();
            if (user && user.rol === 'superadmin') {
                const { data } = await sb.from('perfiles').select('*').eq('rol', 'admin');
                document.getElementById('admins').innerHTML = (data || []).map(a => `
                    <div style="border-bottom:1px solid #eee; padding:10px;">
                        <b>${a.email}</b> - Vence: ${a.vencimiento}
                    </div>
                `).join('');
            }
        }
        init();
    </script>
</body>
</html>
