<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Panel Maestro | Nostalgia Cubana Studio</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #3b82f6; --dark: #0f172a; --accent: #10b981; --danger: #ef4444; --warning: #f59e0b; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: #f1f5f9; color: #1e293b; }
        nav { background: var(--dark); color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .container { padding: 20px; max-width: 1200px; margin: auto; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 30px; border: 1px solid #e2e8f0; }
        .grid-form { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-top: 15px; }
        input, select { padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 14px; width: 100%; }
        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th { background: #f8fafc; text-align: left; padding: 12px; font-size: 0.75rem; color: #64748b; border-bottom: 2px solid #f1f5f9; }
        td { padding: 12px; border-top: 1px solid #f1f5f9; font-size: 14px; }
        .btn { padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; }
        .btn-add { background: var(--primary); color: white; width: 100%; }
        .btn-del { background: #fee2e2; color: var(--danger); }
        .badge { padding: 6px 12px; border-radius: 6px; font-size: 0.7rem; font-weight: bold; display: inline-flex; align-items: center; gap: 5px; }
        .status-active { background: #dcfce7; color: #166534; }
        .status-expired { background: #fff7ed; color: #9a3412; }
        .status-deleted { background: #fee2e2; color: #991b1b; }
        .date-input { padding: 5px; border: 1px solid #cbd5e1; border-radius: 4px; }
        @media (max-width: 768px) {
            .container { padding: 15px; }
            .grid-form { grid-template-columns: 1fr; }
            th, td { padding: 8px; font-size: 0.8rem; }
        }
    </style>
</head>
<body>
<nav>
    <div style="font-weight: bold;"><i class="fas fa-crown" style="color: #fbbf24;"></i> Panel Maestro | Nostalgia Cubana</div>
    <button onclick="logout()" style="background:none; color:white; border:1px solid rgba(255,255,255,0.3); padding:8px 16px; border-radius:8px;">Cerrar Sesión</button>
</nav>
<div class="container">
    <div class="card">
        <h3><i class="fas fa-user-plus"></i> Registrar Nuevo Cliente</h3>
        <div class="grid-form">
            <input type="email" id="newEmail" placeholder="Correo del Cliente">
            <input type="password" id="newPass" placeholder="Contraseña Temporal">
            <input type="date" id="newVence">
            <button class="btn btn-add" id="btnCrear" onclick="crearAdmin()">Crear Acceso</button>
        </div>
    </div>
    <div class="card">
        <h3><i class="fas fa-store"></i> Gestión de Establecimientos</h3>
        <div class="table-container">
            <table>
                <thead><tr><th>Cliente</th><th>Vencimiento</th><th>Estado</th><th>Reportes</th><th>Acciones</th></tr></thead>
                <tbody id="listaAdmins"></tbody>
            </table>
        </div>
    </div>
</div>
<script>
    (function(){ 
const SUPABASE_URL = 'https://bmmzvqfordvjgzkxzosu.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJtbXp2cWZvcmR2amd6a3h6b3N1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1MjAwODYsImV4cCI6MjA5NDA5NjA4Nn0.4mqHOHnoKamDBC78QY8A78bfGLL4GllvyHPLKrvBpAU';
window.supabaseInstance = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const sb = window.supabaseClient;
    async function checkAuth(){
        const { data:{user} } = await sb.auth.getUser();
        if(!user){ window.location.replace('index.html'); return; }
        const { data:profile } = await sb.from('perfiles').select('rol').eq('id',user.id).single();
        if(!profile || profile.rol!=='superadmin'){ window.location.replace('index.html'); return; }
        cargarAdmins();
    }
    async function cargarAdmins(){
        const { data } = await sb.from('perfiles').select('*').eq('rol','admin').order('vencimiento',{ascending:true});
        const lista = document.getElementById('listaAdmins');
        lista.innerHTML='';
        if(!data){ return; }
        data.forEach(admin=>{
            const hoy=new Date(), fechaVence=new Date(admin.vencimiento), estaVencido=hoy>fechaVence;
            let icono,textoEstado,claseBadge,filaEstilo="";
            if(admin.eliminado){ icono='<i class="fas fa-times" style="color:#ef4444;"></i>'; textoEstado='ELIMINADO'; claseBadge='status-deleted'; filaEstilo='opacity:0.6; background:#fff1f2;'; }
            else if(estaVencido){ icono='<i class="fas fa-clock" style="color:#f59e0b;"></i>'; textoEstado='INACTIVO'; claseBadge='status-expired'; }
            else { icono='<i class="fas fa-check" style="color:#10b981;"></i>'; textoEstado='ACTIVO'; claseBadge='status-active'; }
            lista.innerHTML += `<tr style="${filaEstilo}">
                <td>${icono} <b>${admin.email}</b></td>
                <td><input type="date" class="date-input" value="${admin.vencimiento?.split('T')[0]||''}" onchange="actualizarDato('${admin.id}','vencimiento',this.value)"></td>
                <td><span class="badge ${claseBadge}">${textoEstado}</span></td>
                <td><input type="checkbox" ${admin.premium_reportes?'checked':''} onchange="actualizarDato('${admin.id}','premium_reportes',this.checked)"></td>
                <td>${admin.eliminado ? `<button class="btn" style="background:#e0f2fe;color:#0369a1;" onclick="actualizarDato('${admin.id}','eliminado',false)"><i class="fas fa-undo"></i></button>` : `<button class="btn btn-del" onclick="eliminarLogico('${admin.id}')"><i class="fas fa-trash"></i></button>`}</td>
            </tr>`;
        });
    }
    async function actualizarDato(id,campo,valor){ await sb.from('perfiles').update({ [campo]: valor }).eq('id',id); cargarAdmins(); }
    async function crearAdmin(){
        const email=document.getElementById('newEmail').value, password=document.getElementById('newPass').value, vencimiento=document.getElementById('newVence').value;
        if(!email||!password||!vencimiento) return alert("Completa los datos");
        const { data: authData, error: authError } = await sb.auth.signUp({ email, password });
        if(authError) return alert(authError.message);
        await sb.from('perfiles').insert([{ id: authData.user.id, email, rol:'admin', vencimiento, premium_reportes:false, premium_personal:true, eliminado:false }]);
        alert("Cliente creado");
        cargarAdmins();
    }
    async function eliminarLogico(id){ if(confirm("¿Marcar este usuario como ELIMINADO?")){ await sb.from('perfiles').update({ eliminado: true }).eq('id',id); cargarAdmins(); } }
    async function logout(){ await sb.auth.signOut(); window.location.replace('index.html'); }
    checkAuth();
</script>
</body>
</html>
