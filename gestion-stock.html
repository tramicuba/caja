<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario | Nostalgia Cubana</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config-auth.js"></script>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; padding: 20px; }
        .card { background: #1e293b; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #334155; }
        input { padding: 8px; border-radius: 5px; border: 1px solid #334155; background: #0f172a; color: white; }
        .btn { padding: 8px 15px; border-radius: 5px; cursor: pointer; border: none; }
        .btn-add { background: #2563eb; color: white; }
        .btn-del { background: #ef4444; color: white; }
    </style>
</head>
<body>
    <h1>Gestión de Inventario</h1>
    <div class="card">
        <h3>Nuevo Producto</h3>
        <input type="text" id="nombre" placeholder="Nombre">
        <input type="number" id="stock" placeholder="Stock Inicial">
        <input type="number" id="precio" placeholder="Precio Venta">
        <button class="btn btn-add" onclick="agregarProducto()">Guardar</button>
    </div>
    <div class="card">
        <table>
            <thead><tr><th>Producto</th><th>Stock</th><th>Precio</th><th>Acciones</th></tr></thead>
            <tbody id="tabla-productos"></tbody>
        </table>
    </div>
    <script>
        const sb = window.sb;
        let adminId = null;
        async function init() {
            const user = await validarAccesoGlobal();
            if (user) {
                adminId = user.id;
                fetchData();
            }
        }
        async function fetchData() {
            const { data } = await sb.from('productos').select('*').eq('owner_id', adminId).eq('eliminado', false);
            const tbody = document.getElementById('tabla-productos');
            tbody.innerHTML = data.map(p => `
                <tr>
                    <td>${p.nombre}</td>
                    <td>${p.stock}</td>
                    <td>$${p.precio}</td>
                    <td><button class="btn btn-del" onclick="eliminar('${p.id}')">Eliminar</button></td>
                </tr>
            `).join('');
        }
        async function agregarProducto() {
            const nombre = document.getElementById('nombre').value;
            const stock = document.getElementById('stock').value;
            const precio = document.getElementById('precio').value;
            await sb.from('productos').insert([{ nombre, stock, precio, owner_id: adminId }]);
            fetchData();
        }
        async function eliminar(id) {
            if(confirm('¿Seguro?')) {
                await sb.from('productos').update({ eliminado: true }).eq('id', id);
                fetchData();
            }
        }
        init();
    </script>
</body>
</html>
