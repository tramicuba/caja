<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario | Nostalgia Cubana</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config-auth.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --primary: #3b82f6;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --dark: #0f172a;
            --card: #1e293b;
            --border: #334155;
            --text-muted: #94a3b8;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--dark); color: white; display: flex; height: 100vh; }

        /* Sidebar */
        .sidebar { width: 260px; background: var(--card); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .sidebar-header { padding: 30px 20px; text-align: center; }
        .sidebar-header i { font-size: 2rem; color: var(--primary); }
        .nav-links { flex: 1; padding: 10px; }
        .nav-links a {
            display: flex; align-items: center; padding: 12px 15px; color: var(--text-muted);
            text-decoration: none; border-radius: 10px; margin-bottom: 5px; transition: 0.2s;
        }
        .nav-links a:hover, .nav-links a.active { background: rgba(59, 130, 246, 0.1); color: white; }
        .nav-links i { width: 25px; margin-right: 10px; }

        /* Main Content */
        .main-content { flex: 1; overflow-y: auto; padding: 30px; }
        .header-actions { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }

        /* Formulario Flotante/Modal */
        .card-form {
            background: var(--card); border: 1px solid var(--border); padding: 25px;
            border-radius: 20px; margin-bottom: 30px; display: none; /* Se activa con JS */
        }
        .grid-form { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; }
        
        .form-group { display: flex; flex-direction: column; gap: 8px; }
        label { font-size: 0.8rem; color: var(--text-muted); font-weight: 600; }
        input {
            padding: 12px; background: #0f172a; border: 1px solid var(--border);
            border-radius: 10px; color: white; transition: 0.3s;
        }
        input:focus { outline: none; border-color: var(--primary); }

        /* Tabla de Productos */
        .table-container { background: var(--card); border-radius: 20px; border: 1px solid var(--border); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { background: rgba(255,255,255,0.03); padding: 15px 20px; font-size: 0.85rem; color: var(--text-muted); text-transform: uppercase; }
        td { padding: 15px 20px; border-bottom: 1px solid var(--border); }
        
        .badge-stock { padding: 4px 10px; border-radius: 6px; font-size: 0.75rem; font-weight: 700; }
        .stock-low { background: rgba(239, 68, 68, 0.1); color: var(--danger); }
        .stock-ok { background: rgba(16, 185, 129, 0.1); color: var(--success); }

        .btn {
            padding: 10px 20px; border-radius: 10px; border: none; cursor: pointer;
            font-weight: 600; display: inline-flex; align-items: center; gap: 8px; transition: 0.3s;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-success { background: var(--success); color: white; }
        .btn-danger { background: rgba(239, 68, 68, 0.1); color: var(--danger); }
        .btn-danger:hover { background: var(--danger); color: white; }

        .search-box { position: relative; width: 300px; }
        .search-box i { position: absolute; left: 15px; top: 12px; color: var(--text-muted); }
        .search-box input { width: 100%; padding-left: 40px; }

    </style>
</head>
<body>

    <nav class="sidebar">
        <div class="sidebar-header">
            <i class="fas fa-boxes"></i>
            <h3>Gestión</h3>
        </div>
        <div class="nav-links">
            <a href="admin.html"><i class="fas fa-chart-line"></i> Dashboard</a>
            <a href="#" class="active"><i class="fas fa-cubes"></i> Productos</a>
            <a href="gestion-dependientes.html"><i class="fas fa-users"></i> Vendedores</a>
            <a href="reportes.html"><i class="fas fa-file-invoice-dollar"></i> Reportes</a>
            <a href="#" onclick="cerrarSesion()"><i class="fas fa-sign-out-alt"></i> Salir</a>
        </div>
    </nav>

    <main class="main-content">
        <div class="header-actions">
            <div>
                <h1>Inventario de Productos</h1>
                <p style="color: var(--text-muted)">Administra el stock y precios de tu negocio.</p>
            </div>
            <button class="btn btn-primary" onclick="toggleForm()">
                <i class="fas fa-plus"></i> Nuevo Producto
            </button>
        </div>

        <div id="productForm" class="card-form">
            <h3 id="formTitle" style="margin-bottom: 20px;">Agregar Nuevo Producto</h3>
            <div class="grid-form">
                <div class="form-group">
                    <label>Nombre del Producto</label>
                    <input type="text" id="prod_nombre" placeholder="Ej: Café Cubano">
                </div>
                <div class="form-group">
                    <label>Stock Inicial</label>
                    <input type="number" id="prod_stock" placeholder="0">
                </div>
                <div class="form-group">
                    <label>Precio Costo ($)</label>
                    <input type="number" step="0.01" id="prod_costo" placeholder="0.00">
                </div>
                <div class="form-group">
                    <label>Precio Venta ($)</label>
                    <input type="number" step="0.01" id="prod_venta" placeholder="0.00">
                </div>
                <div class="form-group" style="justify-content: flex-end; flex-direction: row; gap: 10px; align-items: flex-end;">
                    <button class="btn" style="background: transparent; color: white;" onclick="toggleForm()">Cancelar</button>
                    <button class="btn btn-success" onclick="guardarProducto()">Guardar</button>
                </div>
            </div>
        </div>

        <div class="header-actions">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchTable" placeholder="Filtrar por nombre..." oninput="filtrarTabla()">
            </div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Producto</th>
                        <th>Costo</th>
                        <th>Venta</th>
                        <th>Margen</th>
                        <th>Stock</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="inventoryBody">
                    </tbody>
            </table>
        </div>
    </main>

    <script>
        const sb = window.supabaseInstance;
        let currentUser = null;
        let currentEditingId = null;

        async function init() {
            const access = await validarAccesoGlobal();
            if (!access) return;
            currentUser = access.user;
            await fetchData();
        }

        async function fetchData() {
            const { data, error } = await sb
                .from('productos')
                .select('*')
                .eq('owner_id', currentUser.id)
                .order('nombre');

            if (data) renderTable(data);
        }

        function renderTable(items) {
            const tbody = document.getElementById('inventoryBody');
            tbody.innerHTML = items.map(p => {
                const margen = p.precio - p.precio_compra;
                const stockClass = p.stock <= 5 ? 'stock-low' : 'stock-ok';
                
                return `
                    <tr>
                        <td><strong>${p.nombre}</strong></td>
                        <td>$${p.precio_compra.toFixed(2)}</td>
                        <td>$${p.precio.toFixed(2)}</td>
                        <td style="color: var(--success)">$${margen.toFixed(2)}</td>
                        <td><span class="badge-stock ${stockClass}">${p.stock} unidades</span></td>
                        <td>
                            <button class="btn btn-danger" onclick="eliminarProducto('${p.id}')">
                                <i class="fas fa-trash"></i>
                            </button>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        async function guardarProducto() {
            const nombre = document.getElementById('prod_nombre').value;
            const stock = parseInt(document.getElementById('prod_stock').value);
            const costo = parseFloat(document.getElementById('prod_costo').value);
            const venta = parseFloat(document.getElementById('prod_venta').value);

            if (!nombre || isNaN(stock) || isNaN(costo) || isNaN(venta)) {
                alert("Por favor complete todos los campos correctamente.");
                return;
            }

            const payload = {
                nombre,
                stock,
                precio_compra: costo,
                precio: venta,
                owner_id: currentUser.id
            };

            const { data, error } = await sb.from('productos').insert([payload]).select();

            if (error) {
                alert("Error al guardar: " + error.message);
            } else {
                // Registrar el movimiento inicial de stock
                await sb.from('ajustes_stock').insert({
                    producto_id: data[0].id,
                    cantidad: stock,
                    motivo: 'Carga inicial',
                    owner_id: currentUser.id,
                    cantidad_signed: stock
                });

                toggleForm();
                limpiarForm();
                await fetchData();
            }
        }

        async function eliminarProducto(id) {
            if (confirm("¿Seguro que deseas eliminar este producto? Esto no borrará ventas pasadas, pero ya no aparecerá en caja.")) {
                const { error } = await sb.from('productos').delete().eq('id', id);
                if (error) alert("Error: " + error.message);
                else fetchData();
            }
        }

        function toggleForm() {
            const form = document.getElementById('productForm');
            form.style.display = form.style.display === 'block' ? 'none' : 'block';
        }

        function limpiarForm() {
            document.getElementById('prod_nombre').value = '';
            document.getElementById('prod_stock').value = '';
            document.getElementById('prod_costo').value = '';
            document.getElementById('prod_venta').value = '';
        }

        async function cerrarSesion() {
            await sb.auth.signOut();
            window.location.href = 'index.html';
        }

        init();
    </script>
</body>
</html>
